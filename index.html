<html lang="en">
<head>

<title>Plitvice Lakes — Walking Guide</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUGxpdHZpY2UgR3VpZGUiLCJzaG9ydF9uYW1lIjoiUGxpdHZpY2UiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzBhMWQxZCIsInRoZW1lX2NvbG9yIjoiIzBhMWQxZCJ9">
<meta name="theme-color" content="#0a1d1d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg: #0a1d1d;
    --bg2: #0f2b2b;
    --bg3: #163838;
    --card: #122e2e;
    --card-hover: #1a3d3d;
    --accent: #4ecdc4;
    --accent2: #2ab7a9;
    --water: #45b7d1;
    --text: #e8f4f0;
    --text2: #a0c4bc;
    --text3: #6a9e94;
    --orange: #f4a261;
    --red: #e07a5f;
    --green: #81b29a;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(180deg, var(--bg) 60%, transparent);
    padding: 12px 16px 20px;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, var(--accent), var(--water));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .subtitle {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text3);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.speaking { background: var(--orange); box-shadow: 0 0 6px var(--orange); animation: pulse 1.2s ease infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.4); }
  }

  /* ── Map ── */
  #map {
    width: 100%;
    height: 200px;
    border-radius: var(--radius);
    margin: 0 0 6px;
    border: 1px solid var(--bg3);
  }
  .map-wrap { padding: 0 16px; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    padding: 0 16px;
    gap: 4px;
    margin-bottom: 8px;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--accent);
    background: var(--bg3);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(78,205,196,0.1);
  }

  /* ── Cards ── */
  .cards-container { padding: 0 16px 100px; }

  .card {
    background: var(--card);
    border: 1px solid var(--bg3);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:active, .card.nearby { background: var(--card-hover); }
  .card.nearby::before { opacity: 1; }
  .card.nearby { border-color: rgba(78,205,196,0.3); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
  }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    line-height: 1.3;
    flex: 1;
  }
  .card-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-distance {
    background: rgba(78,205,196,0.15);
    color: var(--accent);
  }
  .badge-category {
    background: rgba(244,162,97,0.15);
    color: var(--orange);
  }
  .card-oneliner {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
  }

  /* ── Expanded card ── */
  .card-detail {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    overflow-y: auto;
    padding: 0;
    display: none;
    animation: slideUp 0.3s ease;
  }
  .card-detail.open { display: block; }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .detail-header {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(180deg, var(--bg) 80%, transparent);
    padding: 16px 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .detail-back {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid rgba(78,205,196,0.2);
    color: var(--text);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .detail-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    flex: 1;
  }
  .detail-body {
    padding: 0 20px 100px;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text2);
  }
  .detail-body p { margin-bottom: 14px; }

  .detail-actions {
    display: flex;
    gap: 8px;
    padding: 0 20px;
    margin-bottom: 20px;
  }
  .action-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--bg3);
    background: var(--bg2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .action-btn.primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-color: var(--accent);
    color: var(--bg);
  }
  .action-btn.speaking-btn {
    background: var(--orange);
    border-color: var(--orange);
    color: var(--bg);
  }

  /* ── Notification toast ── */
  .toast {
    position: fixed;
    bottom: 20px; left: 16px; right: 16px;
    z-index: 300;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: none;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    animation: toastIn 0.3s ease;
    cursor: pointer;
  }
  .toast.show { display: flex; }
  @keyframes toastIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .toast-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(78,205,196,0.15);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .toast-text { flex: 1; }
  .toast-title { font-weight: 600; font-size: 14px; }
  .toast-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* ── Nav btn ── */
  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--water);
    padding: 6px 10px;
    background: rgba(69,183,209,0.1);
    border: 1px solid rgba(69,183,209,0.2);
    border-radius: 8px;
    text-decoration: none;
    margin-top: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
    font-size: 14px;
    line-height: 1.6;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

  /* ── Leaflet overrides ── */
  .leaflet-container { background: var(--bg2); }
  .user-marker {
    width: 14px; height: 14px;
    background: var(--accent);
    border: 3px solid var(--bg);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
  }
  .poi-marker {
    width: 10px; height: 10px;
    background: var(--orange);
    border: 2px solid var(--bg);
    border-radius: 50%;
    opacity: 0.8;
  }
  .poi-marker.nearby-marker {
    background: var(--accent);
    opacity: 1;
    box-shadow: 0 0 8px var(--accent);
  }
</style>
</head>
<body>

<div class="header">
  <h1>Plitvice Lakes</h1>
  <div class="subtitle">National Park — Walking Guide</div>
  <div class="status-bar">
    <div class="status-dot" id="gpsDot"></div>
    <span id="gpsStatus">Waiting for location…</span>
    <span style="margin-left:auto" id="nearbyCount"></span>
  </div>
</div>

<div class="map-wrap">
  <div id="map"></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="nearby" onclick="switchTab('nearby')">📍 Nearby</div>
  <div class="tab" data-tab="general" onclick="switchTab('general')">📖 General</div>
</div>

<div class="cards-container" id="cardsContainer"></div>

<div class="card-detail" id="detailView">
  <div class="detail-header">
    <div class="detail-back" onclick="closeDetail()">←</div>
    <div class="detail-title" id="detailTitle"></div>
  </div>
  <div class="detail-actions">
    <button class="action-btn primary" id="speakBtn" onclick="toggleSpeak()">
      <span id="speakIcon">🔊</span> <span id="speakLabel">Listen</span>
    </button>
    <button class="action-btn" id="navBtn" onclick="navigateTo()" style="display:none">
      🧭 Navigate
    </button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<div class="toast" id="toast" onclick="onToastTap()">
  <div class="toast-icon">📍</div>
  <div class="toast-text">
    <div class="toast-title" id="toastTitle"></div>
    <div class="toast-sub" id="toastSub">Tap to learn more</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  POI DATA — Plitvice Lakes National Park
// ═══════════════════════════════════════════

const POI_DATA = {
  // Location-based POIs (lat/lon attached)
  located: [
    {
      id: "entrance1",
      name: "Entrance 1 (Lower Lakes)",
      lat: 44.9054,
      lon: 15.6162,
      category: "Infrastructure",
      one_liner: "Main entry point, gateway to the Lower Lakes canyon.",
      summary: `Welcome to Entrance 1 — this is where most visitors begin their journey into Plitvice, and it drops you right into the dramatic stuff. From here you're heading down into the Lower Lakes, which sit in a narrow limestone canyon with sheer cliffs on either side. It's a completely different vibe from the gentler, forested Upper Lakes.\n\nBefore you head in, know that this entrance has luggage storage, restrooms, an info booth with trail maps, and a small café. There's also a gift shop if you want to grab a map poster later. The parking lot connects to intercity bus stops, so this is where most day-trippers from Zagreb or Zadar arrive.\n\nThe park uses a system of marked routes labeled A through K, combining walking, electric boats, and a panoramic shuttle train. The simplest Lower Lakes circuit from here is Route A — about 2 to 3 hours. But honestly, give yourself more time if you can. The boardwalks through the lower canyon are some of the most spectacular in the entire park.`
    },
    {
      id: "entrance2",
      name: "Entrance 2 (Upper Lakes)",
      lat: 44.8804,
      lon: 15.6070,
      category: "Infrastructure",
      one_liner: "Southern entry near the Upper Lakes and park hotels.",
      summary: `Entrance 2 sits on the southern end of the park, right next to the P1 boat terminal on Lake Kozjak — the big lake that separates the Upper and Lower systems. If you're staying at one of the park hotels — Jezero, Plitvice, or Bellevue — this is your door.\n\nFrom here, you can hop on the boat across Kozjak to reach P2, which puts you at the start of the Upper Lakes walking trail. The Upper Lakes are formed on dolomite rock, which gives them a slightly different character — wider, more forested, with cascading waterfalls linking them in a long chain that climbs about 130 meters over roughly 8 kilometers.\n\nThe shuttle train stops ST1 and ST2 are accessible from here, which is useful if you want to skip to the far end of the Upper Lakes and walk back downhill — a much easier circuit. The info booth here has the same panoramic trail maps as Entrance 1 and can help you pick a route based on how much time and energy you have.`
    },
    {
      id: "veliki_slap",
      name: "Veliki Slap (Great Waterfall)",
      lat: 44.9043,
      lon: 15.6088,
      category: "Waterfall",
      one_liner: "At 78 meters, the tallest waterfall in Croatia.",
      summary: `This is Veliki Slap — the Great Waterfall — and at 78 meters, it's the tallest waterfall in Croatia. It's fed by the Plitvica stream, which runs for about 4 kilometers through the forest before plunging off this cliff face in a single dramatic drop.\n\nHere's something interesting: Veliki Slap isn't technically part of the main lake chain. The 16 cascading lakes are fed by the Black and White rivers, which merge to form the system. The Plitvica stream is a separate tributary that joins the Korana River right at the base of this falls, at the point called Sastavci — meaning "confluence." So you're looking at two water systems meeting.\n\nThe best viewpoint is from the lower boardwalk near the Korana canyon. In spring, when snowmelt swells the stream, the falls are at their most powerful and the mist can soak you from 50 meters away. The cliff face behind the falls is entirely travertine — calcium carbonate deposited over thousands of years by the same biological process that built every barrier in the park. You're looking at geology in action.`
    },
    {
      id: "sastavci",
      name: "Sastavci (The Confluence)",
      lat: 44.9038,
      lon: 15.6082,
      category: "Waterfall",
      one_liner: "Where the lake chain meets the Plitvica stream and becomes the Korana River.",
      summary: `Sastavci means "confluence" in Croatian, and it's one of the most photogenic spots in the entire park. This is where the lowest lake, Novakovića Brod, spills over its final travertine barrier in a series of cascades, and right next to it, the Plitvica stream plunges down as Veliki Slap. The two waters merge here to form the Korana River, which then flows northward through its own canyon.\n\nThe viewpoint from the upper trail gives you that classic Plitvice postcard shot — multiple falls side by side tumbling into a misty gorge. The lower boardwalk takes you right to the base where you can feel the spray.\n\nThe Korana River that's born here was historically important — it powered mills and supported small settlements downstream. The village of Korana, just north of the park boundary, is one of the most charming places to stay near Plitvice, set along the river in a setting that feels completely removed from time.`
    },
    {
      id: "kozjak",
      name: "Lake Kozjak (Jezero Kozjak)",
      lat: 44.8892,
      lon: 15.6030,
      category: "Lake",
      one_liner: "The largest Plitvice lake — and the dividing line between Upper and Lower systems.",
      summary: `Kozjak is the big one. At 81.5 hectares and over 2.3 kilometers long, it's the largest lake in the Plitvice system by a wide margin. It's also the deepest — plunging to 46 meters — and it serves as the natural dividing line between the Upper Lakes (which sit on dolomite) and the Lower Lakes (carved into limestone).\n\nThe electric boats that shuttle visitors between P1, P2, and P3 cross this lake. The P1-to-P3 ride takes about 30 minutes and gives you a chance to rest your legs while floating across water that ranges from deep emerald to almost navy blue depending on the light and depth.\n\nThe color of these lakes, by the way, isn't dye or mineral tinting in any simple sense. It's caused by the interaction of dissolved calcium carbonate, the depth of the water, the organisms living in it, and the angle of sunlight. That's why Kozjak — deep, wide, and surrounded by dense forest — tends to look darker and more dramatic than the shallower upper lakes, which lean turquoise.\n\nLook for the small cave entrance visible from the boat on the eastern shore — it's one of several karst caves in the park, formed by the same dissolution processes that created the entire lake system.`
    },
    {
      id: "galovac",
      name: "Lake Galovac",
      lat: 44.8730,
      lon: 15.5990,
      category: "Lake",
      one_liner: "Third-largest lake with spectacular cascading falls and ancient travertine stairs.",
      summary: `Galovac is one of the gems of the Upper Lakes — the third largest in the system at 12.5 hectares, with a maximum depth of 24 meters. What makes it special is the series of cascading waterfalls that connect it to the lakes above and below.\n\nAs you approach from Gradinsko Lake, you'll see an extraordinary thing: concrete stairs that were built long ago to help visitors traverse the falls have been completely encrusted by travertine. The calcium carbonate deposition literally ate the stairs and turned them into natural-looking waterfalls. It's one of the best demonstrations in the park of how fast travertine grows — roughly 1 centimeter per year in active zones.\n\nThe large Galovački Buk waterfall at the north end of the lake drops about 20 meters and is fed by several smaller lakes that pool above it. Look for the thick cushions of Cratoneuron moss on the rocks — this is one of the key species whose branching structure traps calcium carbonate particles and actively builds travertine. Without this moss, the barriers would form far more slowly. The lakes are literally built by living organisms.`
    },
    {
      id: "proscansko",
      name: "Prošćansko Jezero",
      lat: 44.8620,
      lon: 15.5910,
      category: "Lake",
      one_liner: "The highest and second-largest lake, source of the entire cascade at 636m elevation.",
      summary: `Prošćansko Jezero sits at 636 meters above sea level and is the headwater of the entire Plitvice lake system. It's the second largest lake at 68 hectares, with a depth of 37 meters, and it's fed by the Matica River — itself formed from the confluence of the Black River (Crna rijeka) and the White River (Bijela rijeka) that emerge from karst springs in the mountains.\n\nThis is the quietest part of the park. Most visitors on shorter routes never make it this far, so you'll find thick forest right down to the water's edge, and a stillness that the Lower Lakes rarely offer. The lake is surrounded by a mix of beech, fir, and spruce — representative of the Dinaric mountain forests that cover about 75% of the park's total area.\n\nFrom here, the water begins its 130-meter descent through 15 more lakes before exiting as the Korana River at the bottom. Every travertine barrier between here and there was built by the biological process you can see happening in real time on any mossy, splashing surface in the park. The calcium-rich water from these karst springs is essentially a mineral-loaded conveyor belt, and the moss and microbes are the construction crew.`
    },
    {
      id: "ciginovac",
      name: "Lake Ciginovac",
      lat: 44.8670,
      lon: 15.5930,
      category: "Lake",
      one_liner: "Second-highest lake, connected to Prošćansko by the Labudovački waterfall.",
      summary: `Ciginovac — also written Ciganovac in some guides — is the second lake in the chain, sitting at 626 meters. It's connected to Prošćansko above by the Labudovački Slap (Swan Waterfall), one of the taller and more scenic falls in the upper system.\n\nThe lake itself is modest in size at 7 hectares, but it's a good place to observe the classic Plitvice geological setup: the travertine barrier at its outflow, where water spills over into the next lake (Okrugljak), is visibly growing. You can see the porous, sponge-like texture of fresh travertine on the moss-covered lips of the dam.\n\nThe water here has an almost unreal clarity — visibility can exceed 10 meters on calm days. This is because the lakes are oligotrophic, meaning very low in nutrients. The calcium carbonate in the water actually acts as a natural filter, trapping particles and sediment. Combined with the lack of agricultural runoff (the park's catchment is almost entirely forested), it produces water clarity that rivals the best mountain lakes anywhere in Europe.`
    },
    {
      id: "milanovac",
      name: "Lake Milanovac",
      lat: 44.8960,
      lon: 15.6082,
      category: "Lake",
      one_liner: "Upper lake of the Lower Lakes group, named after a historical local figure.",
      summary: `Milanovac is the first lake you encounter in the Lower Lakes section — the transition point where the geology shifts from dolomite to limestone, and the landscape changes from wide forest basins to a narrow, cliff-walled canyon.\n\nThe lake sits at 523 meters elevation and covers about 3.2 hectares. Below it, the Milka Trnina waterfall drops into Lake Gavanovac. This waterfall was named in 1898 after Milka Trnina, a Croatian opera singer who was one of the leading sopranos of her era — she performed at the Metropolitan Opera and was famous across Europe. She donated money from her concerts to help preserve the park, upgrade the walking paths, and build the first real tourist infrastructure. It's a lovely gesture — an opera singer's name given to a waterfall, her voice metaphorically living on in the sound of falling water.\n\nThe Lower Lakes canyon from here down to Sastavci is about 2.5 kilometers, and the boardwalks are carved into and cantilevered from the cliff faces. It's the most dramatic walking section in the park.`
    },
    {
      id: "gradinsko",
      name: "Lake Gradinsko",
      lat: 44.8790,
      lon: 15.6010,
      category: "Lake",
      one_liner: "Reed-bordered lake with nesting wild ducks, linked to Kozjak.",
      summary: `Gradinsko is one of the middle Upper Lakes, bordered by dense reeds that make it one of the best spots in the park for birdwatching. Wild ducks nest here regularly, and if you're quiet on the boardwalk, you'll often see mallards, tufted ducks, and occasionally a common merganser fishing in the clear water.\n\nThe series of cascades that link Gradinsko to Galovac above it are particularly beautiful — the water fans out across wide travertine shelves in a pattern that's constantly changing as the barriers grow and shift. It's a great spot to watch the travertine formation process up close.\n\nThe reeds and emergent vegetation around the lake edges play an important role in the ecosystem. They filter sediment, provide cover for fish (primarily brown trout in the upper lakes), and support amphibian populations. Look for the viviparous lizard on the rocks along the boardwalk — it's one of the few lizard species that gives live birth rather than laying eggs, an adaptation to the cooler mountain climate here.`
    },
    {
      id: "kaludjerovac",
      name: "Lake Kaluđerovac",
      lat: 44.8990,
      lon: 15.6100,
      category: "Lake",
      one_liner: "Deepest of the Lower Lakes, with stunning blue-green color from dissolved minerals.",
      summary: `Kaluđerovac is the deepest of the four Lower Lakes and one of the most visually striking pools in the entire park. Its depth — combined with the limestone canyon walls that shade it for much of the day — gives it an intense blue-green color that can look almost artificial.\n\nThe name comes from "kaluđer," meaning monk, suggesting there may have been a hermitage or religious retreat near here historically. The Lower Lakes are generally named after people — Milanovac, Gavanovac, Kaluđerovac — while the Upper Lakes tend to have descriptive or geographic names.\n\nThe boardwalk through the Lower Lakes canyon passes right along the water's edge here, and in several spots you're walking on wooden planks just centimeters above the lake surface. Look down and you can see the bottom clearly — fallen branches coated in white calcium carbonate, fish darting through the extraordinarily clear water, and the occasional European pond turtle basking on submerged logs.`
    },
    {
      id: "p3_boat",
      name: "P3 Boat Terminal",
      lat: 44.8990,
      lon: 15.6045,
      category: "Infrastructure",

//  APP STATE & LOGIC
// ═══════════════════════════════════════════

let currentTab = 'nearby';
let userLat = null, userLon = null;
let map, userMarker, poiMarkers = [];
let watchId = null;
let currentDetailPOI = null;
let speechUtterance = null;
let isSpeaking = false;
let notifiedPOIs = new Set();
let lastToastPOI = null;

// Haversine distance in meters
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDistance(meters) {
  if (meters < 1000) return `${Math.round(meters)}m`;
  return `${(meters/1000).toFixed(1)}km`;
}

// ── Map setup ──
function initMap() {
  map = L.map('map', {
    center: [44.887, 15.603],
    zoom: 14,
    zoomControl: false,
    attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  // Add POI markers
  POI_DATA.located.forEach(poi => {
    const icon = L.divIcon({ className: 'poi-marker', iconSize: [10, 10] });
    const marker = L.marker([poi.lat, poi.lon], { icon }).addTo(map);
    marker.bindTooltip(poi.name, {
      className: 'poi-tooltip',
      direction: 'top',
      offset: [0, -8]
    });
    marker.on('click', () => openDetail(poi));
    poiMarkers.push({ marker, poi });
  });
}

// ── Geolocation ──
function startTracking() {
  if (!navigator.geolocation) {
    document.getElementById('gpsStatus').textContent = 'Geolocation not available';
    return;
  }

  watchId = navigator.geolocation.watchPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;

      document.getElementById('gpsDot').classList.add('active');
      document.getElementById('gpsStatus').textContent =
        `${userLat.toFixed(5)}, ${userLon.toFixed(5)}`;

      // Update user marker
      if (userMarker) {
        userMarker.setLatLng([userLat, userLon]);
      } else {
        const icon = L.divIcon({ className: 'user-marker', iconSize: [14, 14] });
        userMarker = L.marker([userLat, userLon], { icon, zIndexOffset: 1000 }).addTo(map);
        map.setView([userLat, userLon], 15);
      }

      // Check proximity
      checkProximity();
      if (currentTab === 'nearby') renderCards();
    },
    err => {
      document.getElementById('gpsStatus').textContent = 'Location error — using default view';
      console.warn('Geolocation error:', err);
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

function checkProximity() {
  if (!userLat) return;
  const NOTIFY_RADIUS = 100; // meters

  POI_DATA.located.forEach(poi => {
    const dist = haversine(userLat, userLon, poi.lat, poi.lon);
    if (dist < NOTIFY_RADIUS && !notifiedPOIs.has(poi.id)) {
      notifiedPOIs.add(poi.id);
      showToast(poi, dist);

      // Vibrate if supported
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }
  });

  // Update nearby count
  const nearbyCount = POI_DATA.located.filter(p =>
    haversine(userLat, userLon, p.lat, p.lon) < 500
  ).length;
  document.getElementById('nearbyCount').textContent =
    nearbyCount > 0 ? `${nearbyCount} within 500m` : '';

  // Update marker styles
  poiMarkers.forEach(({ marker, poi }) => {
    const dist = haversine(userLat, userLon, poi.lat, poi.lon);
    const el = marker.getElement();
    if (el) {
      if (dist < 150) {
        el.querySelector('div')?.classList.add('nearby-marker');
      } else {
        el.querySelector('div')?.classList.remove('nearby-marker');
      }
    }
  });
}

// ── Toast notifications ──
function showToast(poi, dist) {
  lastToastPOI = poi;
  document.getElementById('toastTitle').textContent = poi.name;
  document.getElementById('toastSub').textContent = `${formatDistance(dist)} away — Tap to learn more`;
  const toast = document.getElementById('toast');
  toast.classList.add('show');

  setTimeout(() => {
    toast.classList.remove('show');
  }, 8000);
}

function onToastTap() {
  document.getElementById('toast').classList.remove('show');
  if (lastToastPOI) openDetail(lastToastPOI);
}

// ── Tabs ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab)
  );
  renderCards();
}

// ── Card rendering ──
function renderCards() {
  const container = document.getElementById('cardsContainer');

  if (currentTab === 'nearby') {
    let items = POI_DATA.located.map(poi => ({
      ...poi,
      distance: userLat ? haversine(userLat, userLon, poi.lat, poi.lon) : null
    }));

    if (userLat) {
      items.sort((a, b) => a.distance - b.distance);
    }

    if (items.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">📍</div>No location-based points loaded.</div>`;
      return;
    }

    container.innerHTML = items.map(poi => `
      <div class="card ${poi.distance && poi.distance < 150 ? 'nearby' : ''}"
           onclick="openDetail(POI_DATA.located.find(p=>p.id==='${poi.id}'))">
        <div class="card-top">
          <div class="card-title">${poi.name}</div>
          ${poi.distance !== null
            ? `<span class="card-badge badge-distance">${formatDistance(poi.distance)}</span>`
            : `<span class="card-badge badge-category">${poi.category}</span>`
          }
        </div>
        <div class="card-oneliner">${poi.one_liner}</div>
      </div>
    `).join('');

  } else {
    // General tab
    container.innerHTML = POI_DATA.general.map(poi => `
      <div class="card" onclick="openDetail(POI_DATA.general.find(p=>p.id==='${poi.id}'))">
        <div class="card-top">
          <div class="card-title">${poi.name}</div>
          <span class="card-badge badge-category">${poi.category}</span>
        </div>
        <div class="card-oneliner">${poi.one_liner}</div>
      </div>
    `).join('');
  }
}

// ── Detail view ──
function openDetail(poi) {
  currentDetailPOI = poi;
  document.getElementById('detailTitle').textContent = poi.name;
  document.getElementById('detailBody').innerHTML =
    poi.summary.split('\n\n').map(p => `<p>${p}</p>`).join('');

  // Show/hide navigate button
  const navBtn = document.getElementById('navBtn');
  if (poi.lat && poi.lon) {
    navBtn.style.display = 'flex';
  } else {
    navBtn.style.display = 'none';
  }

  // Reset speak button
  stopSpeak();

  document.getElementById('detailView').classList.add('open');
  document.getElementById('detailView').scrollTop = 0;
}

function closeDetail() {
  stopSpeak();
  document.getElementById('detailView').classList.remove('open');
  currentDetailPOI = null;
}

function navigateTo() {
  if (!currentDetailPOI || !currentDetailPOI.lat) return;
  const { lat, lon, name } = currentDetailPOI;
  // Try Google Maps, fall back to Apple Maps
  const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=walking`;
  window.open(url, '_blank');
}

// ── Text-to-Speech ──
function toggleSpeak() {
  if (isSpeaking) {
    stopSpeak();
  } else {
    startSpeak();
  }
}

function startSpeak() {
  if (!currentDetailPOI || !window.speechSynthesis) return;

  stopSpeak();

  const text = currentDetailPOI.summary.replace(/\n/g, ' ');
  speechUtterance = new SpeechSynthesisUtterance(text);
  speechUtterance.rate = 0.95;
  speechUtterance.pitch = 1.0;

  // Try to find a good English voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.includes('Samantha')) ||
                    voices.find(v => v.lang.startsWith('en') && v.localService) ||
                    voices.find(v => v.lang.startsWith('en'));
  if (preferred) speechUtterance.voice = preferred;

  speechUtterance.onend = () => {
    isSpeaking = false;
    updateSpeakButton();
    document.getElementById('gpsDot').classList.remove('speaking');
  };

  speechSynthesis.speak(speechUtterance);
  isSpeaking = true;
  updateSpeakButton();
  document.getElementById('gpsDot').classList.add('speaking');
}

function stopSpeak() {
  if (speechSynthesis.speaking || speechSynthesis.pending) {
    speechSynthesis.cancel();
  }
  isSpeaking = false;
  speechUtterance = null;
  updateSpeakButton();
  document.getElementById('gpsDot').classList.remove('speaking');
}

function updateSpeakButton() {
  const btn = document.getElementById('speakBtn');
  const icon = document.getElementById('speakIcon');
  const label = document.getElementById('speakLabel');
  if (isSpeaking) {
    btn.classList.add('speaking-btn');
    btn.classList.remove('primary');
    icon.textContent = '⏸';
    label.textContent = 'Stop';
  } else {
    btn.classList.remove('speaking-btn');
    btn.classList.add('primary');
    icon.textContent = '🔊';
    label.textContent = 'Listen';
  }
}

// Ensure voices are loaded
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => {};
}

// ── Init ──
initMap();
renderCards();
startTracking();
</script>
</body>
</html>
