<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prapple Tours</title>
<meta name="theme-color" content="#0a1d1d">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a1d1d;
    color: #e8f4f0;
    min-height: 100dvh;
    padding: 40px 16px 60px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    background: linear-gradient(135deg, #4ecdc4, #45b7d1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo p {
    font-size: 12px;
    color: #6a9e94;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .tours { max-width: 400px; margin: 0 auto; }
  a.card {
    display: block;
    background: #122e2e;
    border: 1px solid #163838;
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  a.card:active { background: #1a3d3d; border-color: rgba(78,205,196,0.3); }
  .card-name {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: #e8f4f0;
  }
  .card-sub {
    font-size: 13px;
    color: #6a9e94;
    margin-top: 3px;
  }
  .footer {
    text-align: center;
    padding: 40px 0 0;
    font-size: 11px;
    color: #6a9e94;
    opacity: 0.4;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="logo">
    <h1>🍎 Prapple Tours</h1>
    <p>Walking Guides</p>
  </div>
  <div class="tours">
    <a class="card" href="/pula/pula">
      <div class="card-name">Pula</div>
      <div class="card-sub">Roman amphitheater, temples, and Adriatic coast</div>
    </a>
    <a class="card" href="/plitvice/plitvice">
      <div class="card-name">Plitvice Lakes</div>
      <div class="card-sub">Cascading lakes, travertine waterfalls, and primeval forest</div>
    </a>
  </div>
  <div class="footer">🍎 Prapple Tours</div>
</body>
</html>
