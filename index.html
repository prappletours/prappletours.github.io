<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Plitvice Lakes — Walking Guide</title>
<meta name="theme-color" content="#0a1d1d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg: #0a1d1d;
    --bg2: #0f2b2b;
    --bg3: #163838;
    --card: #122e2e;
    --card-hover: #1a3d3d;
    --accent: #4ecdc4;
    --accent2: #2ab7a9;
    --water: #45b7d1;
    --text: #e8f4f0;
    --text2: #a0c4bc;
    --text3: #6a9e94;
    --orange: #f4a261;
    --red: #e07a5f;
    --green: #81b29a;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  /* ─── CRITICAL: Full-height flex shell, no body scroll ─── */
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    height: 100vh; /* fallback */
    overflow: hidden;
  }

  /* ─── Header: fixed, never scrolls ─── */
  .header {
    flex: 0 0 auto;
    background: var(--bg);
    padding: 10px 16px 8px;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    background: linear-gradient(135deg, var(--accent), var(--water));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .map-toggle {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    font-family: inherit;
  }
  .map-toggle.active { color: var(--accent); border-color: rgba(78,205,196,0.3); }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    font-size: 11px;
    color: var(--text3);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.speaking { background: var(--orange); box-shadow: 0 0 6px var(--orange); animation: pulse 1.2s ease infinite; }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(1.4); }
  }

  /* ─── Map: fixed height, collapsible, never scrolls ─── */
  .map-container {
    flex: 0 0 auto;
    height: 360px;
    padding: 0 12px 6px;
    transition: height 0.3s ease, padding 0.3s ease, opacity 0.2s ease;
    overflow: hidden;
  }
  .map-container.collapsed {
    height: 0;
    padding: 0 12px 0;
    opacity: 0;
    pointer-events: none;
  }
  #map {
    width: 100%;
    height: 100%;
    border-radius: var(--radius);
    border: 1px solid var(--bg3);
  }
  .leaflet-container {
    background: var(--bg2);
    touch-action: none; /* prevent map from capturing page scroll */
  }

  /* ─── Tabs: fixed, never scrolls ─── */
  .tabs {
    flex: 0 0 auto;
    display: flex;
    padding: 0 12px 8px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 9px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab.active {
    color: var(--accent);
    background: var(--bg3);
    border-color: var(--accent);
  }

  /* ─── CRITICAL: This is the ONLY scrollable area ─── */
  .scroll-area {
    flex: 1 1 0;
    min-height: 0; /* allows flex child to shrink below content */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 12px 24px;
  }

  /* ─── Cards ─── */
  .card {
    background: var(--card);
    border: 1px solid var(--bg3);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:active { background: var(--card-hover); }
  .card.nearby { border-color: rgba(78,205,196,0.3); }
  .card.nearby::before { opacity: 1; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 4px;
  }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    line-height: 1.3;
    flex: 1;
  }
  .card-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-distance { background: rgba(78,205,196,0.15); color: var(--accent); }
  .badge-category { background: rgba(244,162,97,0.15); color: var(--orange); }
  .card-oneliner { font-size: 13px; color: var(--text2); line-height: 1.4; }

  /* ─── Detail overlay: full screen, own scroll ─── */
  .detail-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: none;
    flex-direction: column;
  }
  .detail-overlay.open { display: flex; }

  .detail-header {
    flex: 0 0 auto;
    background: var(--bg);
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--bg3);
  }
  .detail-back {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid rgba(78,205,196,0.2);
    color: var(--text);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
  }
  .detail-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    flex: 1;
    line-height: 1.3;
  }

  .detail-actions {
    flex: 0 0 auto;
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    flex-wrap: wrap;
  }
  .action-btn {
    flex: 1;
    min-width: 0;
    padding: 10px 6px;
    border-radius: 10px;
    border: 1px solid var(--bg3);
    background: var(--bg2);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .action-btn.primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-color: var(--accent);
    color: var(--bg);
  }
  .action-btn.speaking-btn {
    background: var(--orange);
    border-color: var(--orange);
    color: var(--bg);
  }
  .action-btn.copied {
    background: var(--green);
    border-color: var(--green);
    color: var(--bg);
  }

  /* Audio progress */
  .audio-progress {
    flex: 0 0 auto;
    padding: 0 16px 4px;
    display: none;
  }
  .audio-progress.visible { display: block; }
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s linear;
  }

  .detail-scroll {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 20px 40px;
  }
  .detail-scroll p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text2);
    margin-bottom: 14px;
  }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 20px; left: 12px; right: 12px;
    z-index: 300;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: none;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    cursor: pointer;
    animation: toastIn 0.3s ease;
  }
  .toast.show { display: flex; }
  @keyframes toastIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .toast-icon {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(78,205,196,0.15);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .toast-text { flex: 1; }
  .toast-title { font-weight: 600; font-size: 13px; }
  .toast-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ─── Leaflet marker styles ─── */
  .user-marker {
    width: 14px; height: 14px;
    background: var(--accent);
    border: 3px solid var(--bg);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
  }
  .poi-marker {
    width: 9px; height: 9px;
    background: var(--orange);
    border: 2px solid var(--bg);
    border-radius: 50%;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div class="app-shell">

  <div class="header">
    <div class="header-row">
      <h1>Plitvice Lakes</h1>
      <button class="map-toggle active" id="mapToggle" onclick="toggleMap()">Map ▾</button>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="gpsDot"></div>
      <span id="gpsStatus">Waiting for location…</span>
      <span style="margin-left:auto" id="nearbyCount"></span>
    </div>
  </div>

  <div class="map-container" id="mapContainer">
    <div id="map"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="nearby" onclick="switchTab('nearby')">📍 Nearby</div>
    <div class="tab" data-tab="general" onclick="switchTab('general')">📖 General</div>
  </div>

  <div class="scroll-area" id="scrollArea"></div>

</div>

<div class="detail-overlay" id="detailView">
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail()">←</button>
    <div class="detail-title" id="detailTitle"></div>
  </div>
  <div class="detail-actions">
    <button class="action-btn primary" id="speakBtn" onclick="toggleSpeak()">
      <span id="speakIcon">🔊</span> <span id="speakLabel">Listen</span>
    </button>
    <button class="action-btn" id="copyVoiceBtn" onclick="copyForVoice()">
      📋 <span id="copyLabel">Copy for Voice</span>
    </button>
    <button class="action-btn" id="navBtn" onclick="navigateTo()" style="display:none">
      🧭 Navigate
    </button>
  </div>
  <div class="audio-progress" id="audioProgress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="detail-scroll" id="detailBody"></div>
</div>

<div class="toast" id="toast" onclick="onToastTap()">
  <div class="toast-icon">📍</div>
  <div class="toast-text">
    <div class="toast-title" id="toastTitle"></div>
    <div class="toast-sub" id="toastSub">Tap to learn more</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG — Change these for your setup
// ═══════════════════════════════════════════════════

// Path to pre-generated MP3 files. Set to a folder like "audio/"
// and name files as {poi_id}.mp3 (e.g. audio/veliki_slap.mp3).
// Set to null to skip and use browser TTS or copy-for-voice.
const AUDIO_BASE_PATH = null;

// Prompt prepended when user taps "Copy for Voice" to paste into
// ChatGPT voice mode, Claude, etc.
const VOICE_PROMPT = "Read the following aloud in a warm, engaging, conversational tone — as if you're a knowledgeable friend walking with me through a national park. Keep it natural, not performative:\n\n";

const NOTIFY_RADIUS = 100;
const NEARBY_HIGHLIGHT = 150;


// ═══════════════════════════════════════════════════
//  POI DATA
// ═══════════════════════════════════════════════════

const POI_DATA = {
  located: [
    {
      id: "entrance1", name: "Entrance 1 (Lower Lakes)",
      lat: 44.9054, lon: 15.6162, category: "Infrastructure",
      one_liner: "Main entry point, gateway to the Lower Lakes canyon.",
      summary: "Welcome to Entrance 1 — this is where most visitors begin their journey into Plitvice, and it drops you right into the dramatic stuff. From here you're heading down into the Lower Lakes, which sit in a narrow limestone canyon with sheer cliffs on either side. It's a completely different vibe from the gentler, forested Upper Lakes.\n\nBefore you head in, know that this entrance has luggage storage, restrooms, an info booth with trail maps, and a small café. There's also a gift shop if you want to grab a map poster later. The parking lot connects to intercity bus stops, so this is where most day-trippers from Zagreb or Zadar arrive.\n\nThe park uses a system of marked routes labeled A through K, combining walking, electric boats, and a panoramic shuttle train. The simplest Lower Lakes circuit from here is Route A — about 2 to 3 hours. But honestly, give yourself more time if you can. The boardwalks through the lower canyon are some of the most spectacular in the entire park."
    },
    {
      id: "entrance2", name: "Entrance 2 (Upper Lakes)",
      lat: 44.8804, lon: 15.6070, category: "Infrastructure",
      one_liner: "Southern entry near the Upper Lakes and park hotels.",
      summary: "Entrance 2 sits on the southern end of the park, right next to the P1 boat terminal on Lake Kozjak — the big lake that separates the Upper and Lower systems. If you're staying at one of the park hotels — Jezero, Plitvice, or Bellevue — this is your door.\n\nFrom here, you can hop on the boat across Kozjak to reach P2, which puts you at the start of the Upper Lakes walking trail. The Upper Lakes are formed on dolomite rock, which gives them a slightly different character — wider, more forested, with cascading waterfalls linking them in a long chain that climbs about 130 meters over roughly 8 kilometers.\n\nThe shuttle train stops ST1 and ST2 are accessible from here, which is useful if you want to skip to the far end of the Upper Lakes and walk back downhill — a much easier circuit."
    },
    {
      id: "veliki_slap", name: "Veliki Slap (Great Waterfall)",
      lat: 44.9043, lon: 15.6088, category: "Waterfall",
      one_liner: "At 78 meters, the tallest waterfall in Croatia.",
      summary: "This is Veliki Slap — the Great Waterfall — and at 78 meters, it's the tallest waterfall in Croatia. It's fed by the Plitvica stream, which runs for about 4 kilometers through the forest before plunging off this cliff face in a single dramatic drop.\n\nHere's something interesting: Veliki Slap isn't technically part of the main lake chain. The 16 cascading lakes are fed by the Black and White rivers, which merge to form the system. The Plitvica stream is a separate tributary that joins the Korana River right at the base of this falls, at the point called Sastavci — meaning \"confluence.\" So you're looking at two water systems meeting.\n\nThe best viewpoint is from the lower boardwalk near the Korana canyon. In spring, when snowmelt swells the stream, the falls are at their most powerful and the mist can soak you from 50 meters away."
    },
    {
      id: "sastavci", name: "Sastavci (The Confluence)",
      lat: 44.9038, lon: 15.6082, category: "Waterfall",
      one_liner: "Where the lake chain meets the Plitvica stream and becomes the Korana River.",
      summary: "Sastavci means \"confluence\" in Croatian, and it's one of the most photogenic spots in the entire park. This is where the lowest lake, Novakovića Brod, spills over its final travertine barrier in a series of cascades, and right next to it, the Plitvica stream plunges down as Veliki Slap. The two waters merge here to form the Korana River, which then flows northward through its own canyon.\n\nThe viewpoint from the upper trail gives you that classic Plitvice postcard shot — multiple falls side by side tumbling into a misty gorge. The lower boardwalk takes you right to the base where you can feel the spray.\n\nThe Korana River that's born here was historically important — it powered mills and supported small settlements downstream. The village of Korana, just north of the park boundary, is one of the most charming places to stay near Plitvice."
    },
    {
      id: "kozjak", name: "Lake Kozjak (Jezero Kozjak)",
      lat: 44.8892, lon: 15.6030, category: "Lake",
      one_liner: "The largest Plitvice lake — dividing line between Upper and Lower systems.",
      summary: "Kozjak is the big one. At 81.5 hectares and over 2.3 kilometers long, it's the largest lake in the Plitvice system by a wide margin. It's also the deepest — plunging to 46 meters — and it serves as the natural dividing line between the Upper Lakes (which sit on dolomite) and the Lower Lakes (carved into limestone).\n\nThe electric boats that shuttle visitors between P1, P2, and P3 cross this lake. The P1-to-P3 ride takes about 30 minutes and gives you a chance to rest your legs while floating across water that ranges from deep emerald to almost navy blue depending on the light and depth.\n\nThe color isn't dye or mineral tinting in any simple sense. It's caused by the interaction of dissolved calcium carbonate, the depth of the water, the organisms living in it, and the angle of sunlight. That's why Kozjak — deep, wide, and surrounded by dense forest — tends to look darker and more dramatic than the shallower upper lakes, which lean turquoise."
    },
    {
      id: "galovac", name: "Lake Galovac",
      lat: 44.8730, lon: 15.5990, category: "Lake",
      one_liner: "Third-largest lake with spectacular cascading falls and travertine stairs.",
      summary: "Galovac is one of the gems of the Upper Lakes — the third largest in the system at 12.5 hectares, with a maximum depth of 24 meters. What makes it special is the series of cascading waterfalls that connect it to the lakes above and below.\n\nAs you approach from Gradinsko Lake, you'll see an extraordinary thing: concrete stairs that were built long ago to help visitors traverse the falls have been completely encrusted by travertine. The calcium carbonate deposition literally ate the stairs and turned them into natural-looking waterfalls. It's one of the best demonstrations in the park of how fast travertine grows — roughly 1 centimeter per year in active zones.\n\nThe large Galovački Buk waterfall at the north end drops about 20 meters. Look for the thick cushions of Cratoneuron moss on the rocks — this is one of the key species whose branching structure traps calcium carbonate particles and actively builds travertine. The lakes are literally built by living organisms."
    },
    {
      id: "proscansko", name: "Prošćansko Jezero",
      lat: 44.8620, lon: 15.5910, category: "Lake",
      one_liner: "The highest and second-largest lake, source of the entire cascade at 636m.",
      summary: "Prošćansko Jezero sits at 636 meters above sea level and is the headwater of the entire Plitvice lake system. It's the second largest lake at 68 hectares, with a depth of 37 meters, and it's fed by the Matica River — itself formed from the confluence of the Black River and the White River that emerge from karst springs in the mountains.\n\nThis is the quietest part of the park. Most visitors on shorter routes never make it this far, so you'll find thick forest right down to the water's edge, and a stillness that the Lower Lakes rarely offer.\n\nFrom here, the water begins its 130-meter descent through 15 more lakes before exiting as the Korana River at the bottom. Every travertine barrier between here and there was built by the biological process you can see happening in real time on any mossy, splashing surface in the park."
    },
    {
      id: "ciginovac", name: "Lake Ciginovac",
      lat: 44.8670, lon: 15.5930, category: "Lake",
      one_liner: "Second-highest lake, connected to Prošćansko by the Labudovački waterfall.",
      summary: "Ciginovac is the second lake in the chain, sitting at 626 meters. It's connected to Prošćansko above by the Labudovački Slap (Swan Waterfall), one of the taller and more scenic falls in the upper system.\n\nThe lake itself is modest in size at 7 hectares, but it's a good place to observe the classic Plitvice geological setup: the travertine barrier at its outflow is visibly growing. You can see the porous, sponge-like texture of fresh travertine on the moss-covered lips of the dam.\n\nThe water here has an almost unreal clarity — visibility can exceed 10 meters on calm days. The lakes are oligotrophic, meaning very low in nutrients. The calcium carbonate acts as a natural filter, trapping particles and sediment. Combined with the fully forested catchment, it produces water clarity that rivals the best mountain lakes anywhere in Europe."
    },
    {
      id: "milanovac", name: "Lake Milanovac",
      lat: 44.8960, lon: 15.6082, category: "Lake",
      one_liner: "Upper lake of the Lower Lakes group, with the Milka Trnina waterfall below.",
      summary: "Milanovac is the first lake you encounter in the Lower Lakes section — the transition point where the geology shifts from dolomite to limestone, and the landscape changes from wide forest basins to a narrow, cliff-walled canyon.\n\nBelow it, the Milka Trnina waterfall drops into Lake Gavanovac. This waterfall was named in 1898 after Milka Trnina, a Croatian opera singer who was one of the leading sopranos of her era — she performed at the Metropolitan Opera and was famous across Europe. She donated money from her concerts to help preserve the park. An opera singer's name given to a waterfall, her voice metaphorically living on in the sound of falling water.\n\nThe Lower Lakes canyon from here down to Sastavci is about 2.5 kilometers, and the boardwalks are carved into and cantilevered from the cliff faces. It's the most dramatic walking section in the park."
    },
    {
      id: "gradinsko", name: "Lake Gradinsko",
      lat: 44.8790, lon: 15.6010, category: "Lake",
      one_liner: "Reed-bordered lake with nesting wild ducks, linked to Kozjak.",
      summary: "Gradinsko is one of the middle Upper Lakes, bordered by dense reeds that make it one of the best spots in the park for birdwatching. Wild ducks nest here regularly, and if you're quiet on the boardwalk, you'll often see mallards, tufted ducks, and occasionally a common merganser fishing in the clear water.\n\nThe cascades that link Gradinsko to Galovac above it are particularly beautiful — the water fans out across wide travertine shelves in a pattern that's constantly changing as the barriers grow and shift.\n\nLook for the viviparous lizard on the rocks along the boardwalk — it's one of the few lizard species that gives live birth rather than laying eggs, an adaptation to the cooler mountain climate here."
    },
    {
      id: "kaludjerovac", name: "Lake Kaluđerovac",
      lat: 44.8990, lon: 15.6100, category: "Lake",
      one_liner: "Deepest of the Lower Lakes, with stunning blue-green color.",
      summary: "Kaluđerovac is the deepest of the four Lower Lakes and one of the most visually striking pools in the entire park. Its depth — combined with the limestone canyon walls that shade it for much of the day — gives it an intense blue-green color that can look almost artificial.\n\nThe name comes from \"kaluđer,\" meaning monk, suggesting there may have been a hermitage near here historically. The Lower Lakes are generally named after people, while the Upper Lakes tend to have descriptive names.\n\nThe boardwalk passes right along the water's edge here, and in several spots you're walking on wooden planks just centimeters above the surface. Look down and you can see the bottom clearly — fallen branches coated in white calcium carbonate, fish darting through the extraordinarily clear water, and the occasional European pond turtle basking on submerged logs."
    },
    {
      id: "p3_boat", name: "P3 Boat Terminal",
      lat: 44.8990, lon: 15.6045, category: "Infrastructure",
      one_liner: "Lower Lakes boat dock — connects to P1 across Kozjak.",
      summary: "P3 is the boat terminal at the southern end of Kozjak, near the transition to the Lower Lakes. After walking through the Lower Lakes canyon, most visitors end up here and take the 30-minute electric boat ride back across Kozjak to P1.\n\nThere's a small café and restrooms here — one of the few refreshment points inside the park. The boat ride is worth savoring: Kozjak is surrounded by dense forest, and on calm days the reflections are mirror-perfect.\n\nThe boats are electric to prevent pollution. The travertine formation process requires very specific chemistry: high calcium carbonate, high dissolved oxygen, and low nutrients. Even small amounts of phosphorus from engine exhaust could accelerate algae growth and change the pH balance. The park's entire geological process depends on pristine water."

    {

      one_liner: "Limestone cave in the Lower Lakes canyon with views of Kaluđerovac.",
      summary: "Šupljara Cave is one of several karst caves accessible from the Lower Lakes boardwalk trail. It's a relatively small cave — more of a deep overhang — but it gives you a dramatic framed view of the canyon and Lake Kaluđerovac below.\n\nThe cave formed through the same dissolution process that created the entire Plitvice landscape. Rainwater absorbs carbon dioxide through soil, becoming slightly acidic, then dissolves limestone as it percolates underground.\n\nThe difference at Plitvice is that the dissolved calcium carbonate doesn't just disappear — it re-emerges in the spring water and gets redeposited as travertine. The caves are the dissolution side of the equation; the lake barriers are the precipitation side. Same mineral, same process, two opposite results."

      one_liner: "Memorial to the first Croatian casualty of the 1991 War of Independence.",
      summary: "Near Entrance 1 stands a memorial to Josip Jović, a 21-year-old Croatian police officer who was killed here on Easter Sunday, March 31, 1991 — widely considered the first combat fatality of the Croatian War of Independence.\n\nAs Yugoslavia was fracturing, Croatian Serb paramilitaries seized control of the national park in late March 1991. On Easter morning, Croatian special police moved to retake the park. Their convoy was ambushed on the road near the entrance, and Jović was killed by machine gun fire near the park's post office.\n\nThe park was occupied through the war and remained closed until after Operation Storm in August 1995. Remarkably, the lakes and travertine formations — products of geological time — weathered the conflict largely intact.\n\nThe incident, known as \"Bloody Easter\" (Krvavi Uskrs), is commemorated annually. It's a reminder that this beautiful place exists in a landscape with recent, painful history."

    {

      summary: "West of the main lake trail lies Čorkova Uvala, one of the last remaining old-growth beech-fir forests in all of Europe. Some trees here are over 250 years old, reaching heights of 50 meters. The forest has never been commercially logged.\n\nThere are two hiking trails: a 21-kilometer loop and a shorter 9-kilometer route. Both require proper hiking shoes — these are real forest trails, not boardwalks.\n\nThe canopy is dominated by European beech and silver fir, with Norway spruce at higher elevations. Dead and fallen trees are left in place — crucial for cavity-nesting birds and hundreds of invertebrate species.\n\nThis is also prime habitat for the park's large predators. The quiet, undisturbed forest is where bears den and wolves move through. If you hike here, make noise to avoid surprising wildlife."

      summary: "Labudovački Slap — Swan Falls — marks the beginning of the Plitvice cascade proper. It's where water spills over the first major travertine barrier out of Prošćansko Lake and drops into Ciginovac.\n\nHistorically, this is where the first tourist accommodation was built. In 1861, a guesthouse called \"the Emperor's house\" was erected nearby. When Crown Princess Stéphanie of Belgium visited in 1888, paths were laid out for the first time — two still bear the names of Emperor Franz Joseph's daughters.\n\nA Czech entrepreneur named Gustav Janeček built a restaurant here and in 1893 founded the Society for the Preservation of the Plitvice Lakes — the park's first conservation effort, more than 50 years before national park designation in 1949."

    {

      one_liner: "Little-visited cave in the Lower Lakes area — one of the park's quieter secrets.",
      summary: "Golubnjača is a cave near the Lower Lakes that most visitors walk right past. It's off the main boardwalk circuit, which means it's one of the genuinely uncrowded spots in the park.\n\nThe name comes from \"golub\" — pigeon or dove — and it's home to several bat species. The park has documented 22 bat species in total, making Plitvice one of the most bat-diverse protected areas in Croatia.\n\nBats play an underappreciated role in the Plitvice ecosystem. As major insect consumers, they help regulate mosquitoes, moths, and other invertebrates. The park's 321 documented butterfly and moth species exist in a delicate balance with their predators.\n\nIf you visit, bring a light and stay on marked paths. Don't disturb roosting bats — they're all protected under EU habitats directives."
    }
  ],

  general: [
    {
      id: "gen_travertine", name: "How Travertine Builds a Landscape",
      category: "Geology",
      one_liner: "The living geological process that created every lake and waterfall here.",
      summary: "Here's the thing that makes Plitvice genuinely unique: it's building itself. Right now. Measurably.\n\nRainwater percolates through soil, absorbing CO₂ to become weakly acidic. This dissolves the underlying limestone as it moves through karst bedrock. When it emerges from springs, the water is loaded with dissolved calcium carbonate at very high CO₂ concentrations.\n\nAs this water flows over cascades, it releases CO₂ to the atmosphere — like opening a carbonated drink. The calcium carbonate becomes supersaturated and precipitates out as calcite on any available surface.\n\nBut here's where biology takes over. Mosses — especially Bryum and Cratoneuron species — provide a branching scaffold for deposits. Algae and cyanobacteria further reduce CO₂ through photosynthesis, accelerating precipitation. Travertine builds up preferentially on living moss, creating porous, sponge-like rock that gradually hardens.\n\nThe barriers grow at 1 to 3 centimeters per year. Old waterfalls disappear as barriers grow tall enough to calm the flow. New ones appear as rising barriers redirect water. It's a landscape in slow, constant motion."
    },
    {
      id: "gen_karst", name: "Karst: The Hidden Plumbing",
      category: "Geology",
      one_liner: "The porous limestone underworld that feeds the entire lake system.",
      summary: "Everything you see on the surface — the lakes, waterfalls, springs — is just the visible output of an enormous underground plumbing system. This is karst terrain.\n\nKarst forms wherever soluble rock is exposed to slightly acidic water. Over millions of years, it dissolves channels, tunnels, and caves, creating underground networks that carry entire rivers. The Dinaric Alps contain some of the most extensive karst on Earth.\n\nThe park's water arrives from two sources: the Black River and the White River, both emerging from karst springs with high dissolved mineral content — the raw material for travertine.\n\nThe Upper Lakes sit on dolomite, a magnesium-rich limestone that's less soluble, so they're wider and shallower. The Lower Lakes are carved into pure limestone, which dissolves more readily, producing the narrow canyon. Same park, two different geological personalities."
    },
    {
      id: "gen_bears", name: "Europe's Big Three Predators",

      summary: "Plitvice is one of very few places in Europe where all three of the continent's largest predators maintain viable breeding populations in the same territory.\n\nThe brown bear is the park's logo animal. An estimated 40 to 60 bears live here, primarily eating berries, nuts, insects, and occasional deer. The park has never recorded a bear attack on a visitor.\n\nIf you want evidence of bears, take the quieter forest trails. Look for claw marks on beech trees, overturned logs where bears foraged for beetle larvae, and five-toed tracks in soft mud.\n\nTwo to three wolf packs — roughly 10 to 20 individuals — use the forests as territory. Wolves are almost never seen; most long-term rangers have never observed one in the open. The park is currently GPS-tracking a young wolf to study movement patterns.\n\nThe Eurasian lynx is the rarest. The EU-funded LIFE Lynx project is working to restore the population, which suffers from a very small genetic pool."
    },
    {
      id: "gen_birds", name: "Birdwatching at Plitvice",
      category: "Wildlife",
      one_liner: "Over 160 species, from golden eagles to tiny dippers on the cascades.",
      summary: "Over 160 bird species have been recorded here. Star residents include the Eurasian eagle-owl and golden eagle, both year-round.\n\nThe most delightful bird to spot from the boardwalks is the white-throated dipper. These stocky little birds live right on the cascades — they walk underwater along stream beds, feeding on aquatic invertebrates. Seeing one bob and curtsey on a mossy rock before plunging into a waterfall is one of Plitvice's small, perfect moments.\n\nIn the reed beds around Gradinsko Lake, look for mallards, tufted ducks, and the occasional common merganser. Black storks pass through during migration, and ospreys have been spotted fishing on Kozjak.\n\nThe park's 321 recorded butterfly and moth species are also worth noticing. Spring and early summer bring clouds of them to the meadows — an almost absurd diversity tied to intact, pesticide-free ecosystems."
    },
    {
      id: "gen_water_color", name: "Why the Lakes Change Color",
      category: "Science",
      one_liner: "The shifting palette of azure, emerald, grey, and turquoise — explained.",
      summary: "The famous colors — azure, turquoise, emerald, steely grey — aren't produced by any single factor.\n\nDissolved calcium carbonate scatters short-wavelength blue light, giving a natural blue-green base tone. Depth matters enormously: shallow lakes appear lighter turquoise (light bouncing off the bottom), while deep Kozjak at 46 meters absorbs red light and appears dark blue.\n\nOrganisms — algae, cyanobacteria, diatoms — contribute green tones. Surrounding forests reflect green onto the surface. Limestone cliffs reflect white. Overcast skies produce grey.\n\nAll of these change with seasons, weather, time of day, and viewing angle. The same lake looks completely different at 8 AM and 2 PM. No two visits produce the same palette."
    },
    {
      id: "gen_history", name: "From Devil's Garden to UNESCO",
      category: "History",
      one_liner: "How a wild karst wilderness became Croatia's most protected landscape.",
      summary: "On 17th-century maps, this area was marked as \"Vražji Vrt\" — Devil's Garden. The word \"Plitvice\" derives from \"plitvak,\" meaning shallow — a reference to the shallow basins across the travertine terraces.\n\nThe first written mention comes from 1777. By the mid-1800s travelers were arriving, and in 1861 the first guesthouse was built. Crown Princess Stéphanie's 1888 visit prompted the first proper trails. Gustav Janeček's 1893 preservation society was the first organized conservation effort.\n\nOfficial national park status came on April 8, 1949 — Croatia's first. In 1979, UNESCO inscribed it as a World Heritage Site, specifically highlighting the travertine formation as an outstanding example of ongoing geological change.\n\nThe 1991-1995 war temporarily closed the park, but it survived and today receives over a million visitors per year — managed through timed entry, visitor caps, and strict trail rules."
    },
    {
      id: "gen_forest", name: "The Forest That Covers 75% of the Park",
      category: "Nature",
      one_liner: "Most visitors see 2% of Plitvice — the rest is ancient woodland.",
      summary: "The lakes and waterfalls cover less than 1% of the park's total area. Forests cover about 75%. The park spans nearly 30,000 hectares and the vast majority is woodland most tourists never enter.\n\nThe dominant species are European beech and silver fir — classic Dinaric montane forest. The Čorkova Uvala area contains one of Europe's last truly primeval forests, with trees over 250 years old.\n\nThe forest isn't just scenery — it's functionally essential. Tree roots prevent erosion. The canopy regulates temperature and humidity. The forested watershed filters water before it enters the lake system. If the forests degrade, water quality changes, and if water quality changes, travertine formation slows or stops. The lakes exist because the forest protects them."
    },
    {
      id: "gen_aquatic", name: "Life Beneath the Surface",
      category: "Wildlife",
      one_liner: "Fish, crayfish, amphibians, and the microscopic organisms that build everything.",
      summary: "The lakes are oligotrophic to mesotrophic — low in nutrients, high in dissolved oxygen, with visibility sometimes exceeding 10 meters.\n\nBrown trout are the native apex predator, especially in the upper lakes. The native river crayfish and stone crayfish are both strictly protected bioindicators of water quality. Non-native chub and roach have unfortunately displaced trout from some lower lakes.\n\nAmong 14 amphibian species, look for the fire salamander — striking black-and-yellow pattern — along shaded paths after rain.\n\nBut the most important aquatic organisms are invisible. The cyanobacteria, diatoms, and algae that colonize moss surfaces are the true engineers. Their photosynthesis extracts CO₂, their mucus traps mineral particles — this is what drives travertine formation. Without these microorganisms, the entire lake system would not exist."
    },
    {
      id: "gen_seasons", name: "Four Seasons, Four Different Parks",
      category: "Practical",
      one_liner: "Each season transforms Plitvice into an almost unrecognizable landscape.",
      summary: "Spring brings peak water flow — snowmelt makes every waterfall thunderous. Wildflowers carpet the meadows. Crowds are moderate.\n\nSummer means warm temperatures for long hikes but peak crowds and timed entry. Water levels drop and smaller cascades may thin. The green palette is at its richest.\n\nAutumn is the photographer's season. Beech forests turn gold and russet, reflected in still lake surfaces. Visitor numbers drop and the light is warm.\n\nWinter transforms everything. Waterfalls freeze into massive ice sculptures. Snow blankets the boardwalks. It's the season when wolves are most often heard — their howls carry across the silent, frozen landscape. Magical, but bring proper winter gear."
    },
    {
      id: "gen_rules", name: "Why the Rules Exist",
      category: "Practical",
      one_liner: "No swimming, no leaving trails — and the science behind why.",
      summary: "No swimming or wading: the travertine barriers are extremely fragile. A person stepping on an active barrier can crack through the thin crust of newly deposited calcite and destroy months of formation. The barriers look like rock, but the growing surface is often just a thin shell over soft, wet moss.\n\nNo leaving trails: the moss communities and rare plant species — including the lady's slipper orchid — are sensitive to trampling. One shortcut can damage plants that take decades to establish.\n\nThe wooden boardwalks are designed to hover above the travertine without touching it — supported on posts driven into bedrock beside the barriers, not into them.\n\nEutrophication is the biggest long-term threat. If excess nutrients enter the water — from sunscreen, food waste, wastewater — algae blooms change the chemistry and can weaken the travertine. The park has been fighting this battle since tourism accelerated, and so far, the barriers are holding."
    }

};


// ═══════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════

let currentTab = 'nearby';
let userLat = null, userLon = null;
let leafletMap, userMarker;
let currentDetailPOI = null;
let speechUtterance = null;
let isSpeaking = false;
let currentAudio = null;
let notifiedPOIs = new Set();
let lastToastPOI = null;
let mapVisible = true;

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(m) { return m < 1000 ? Math.round(m)+'m' : (m/1000).toFixed(1)+'km'; }


// ── Map ──
function initMap() {
  leafletMap = L.map('map', {
    center: [44.887, 15.603],
    zoom: 14,
    zoomControl: false,
    attributionControl: false,
    dragging: true,
    scrollWheelZoom: false,
    touchZoom: true
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(leafletMap);

  POI_DATA.located.forEach(poi => {
    const icon = L.divIcon({ className: 'poi-marker', iconSize: [9,9] });
    const m = L.marker([poi.lat, poi.lon], { icon }).addTo(leafletMap);
    m.on('click', () => openDetail(poi));
  });
}

function toggleMap() {
  mapVisible = !mapVisible;
  const c = document.getElementById('mapContainer');
  const b = document.getElementById('mapToggle');
  c.classList.toggle('collapsed', !mapVisible);
  b.textContent = mapVisible ? 'Map ▾' : 'Map ▸';
  b.classList.toggle('active', mapVisible);
  if (mapVisible) setTimeout(() => leafletMap.invalidateSize(), 350);
}


// ── GPS ──
function startTracking() {
  if (!navigator.geolocation) {
    document.getElementById('gpsStatus').textContent = 'Geolocation not available';
    return;
  }
  navigator.geolocation.watchPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      document.getElementById('gpsDot').classList.add('active');
      document.getElementById('gpsStatus').textContent = userLat.toFixed(4)+', '+userLon.toFixed(4);

      if (userMarker) { userMarker.setLatLng([userLat, userLon]); }
      else {
        const icon = L.divIcon({ className: 'user-marker', iconSize: [14,14] });
        userMarker = L.marker([userLat, userLon], { icon, zIndexOffset: 1000 }).addTo(leafletMap);
        leafletMap.setView([userLat, userLon], 15);
      }
      checkProximity();
      if (currentTab === 'nearby') renderCards();
    },
    () => { document.getElementById('gpsStatus').textContent = 'No GPS — cards sorted by name'; },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

function checkProximity() {
  if (!userLat) return;
  POI_DATA.located.forEach(poi => {
    const d = haversine(userLat, userLon, poi.lat, poi.lon);
    if (d < NOTIFY_RADIUS && !notifiedPOIs.has(poi.id)) {
      notifiedPOIs.add(poi.id);
      showToast(poi, d);
      if (navigator.vibrate) navigator.vibrate([100,50,100]);
    }
  });
  const nc = POI_DATA.located.filter(p => haversine(userLat,userLon,p.lat,p.lon)<500).length;
  document.getElementById('nearbyCount').textContent = nc > 0 ? nc+' within 500m' : '';
}


// ── Toast ──
function showToast(poi, dist) {
  lastToastPOI = poi;
  document.getElementById('toastTitle').textContent = poi.name;
  document.getElementById('toastSub').textContent = formatDist(dist)+' away — Tap to learn more';
  document.getElementById('toast').classList.add('show');
  setTimeout(() => document.getElementById('toast').classList.remove('show'), 8000);
}
function onToastTap() {
  document.getElementById('toast').classList.remove('show');
  if (lastToastPOI) openDetail(lastToastPOI);
}


// ── Tabs & Cards ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  renderCards();
  document.getElementById('scrollArea').scrollTop = 0;
}

function renderCards() {
  const c = document.getElementById('scrollArea');
  if (currentTab === 'nearby') {
    let items = POI_DATA.located.map(p => ({...p, distance: userLat ? haversine(userLat,userLon,p.lat,p.lon) : null}));
    if (userLat) items.sort((a,b) => a.distance - b.distance);
    c.innerHTML = items.map(p => `
      <div class="card ${p.distance && p.distance < NEARBY_HIGHLIGHT ? 'nearby' : ''}" onclick="openDetailById('located','${p.id}')">
        <div class="card-top">
          <div class="card-title">${p.name}</div>
          ${p.distance !== null
            ? `<span class="card-badge badge-distance">${formatDist(p.distance)}</span>`
            : `<span class="card-badge badge-category">${p.category}</span>`}
        </div>
        <div class="card-oneliner">${p.one_liner}</div>
      </div>`).join('');
  } else {
    c.innerHTML = POI_DATA.general.map(p => `
      <div class="card" onclick="openDetailById('general','${p.id}')">
        <div class="card-top">
          <div class="card-title">${p.name}</div>
          <span class="card-badge badge-category">${p.category}</span>
        </div>
        <div class="card-oneliner">${p.one_liner}</div>
      </div>`).join('');
  }
}


// ── Detail ──
function openDetailById(group, id) {
  const poi = POI_DATA[group].find(p => p.id === id);
  if (poi) openDetail(poi);
}

function openDetail(poi) {
  currentDetailPOI = poi;
  document.getElementById('detailTitle').textContent = poi.name;
  document.getElementById('detailBody').innerHTML = poi.summary.split('\n\n').map(p => '<p>'+p+'</p>').join('');
  document.getElementById('navBtn').style.display = (poi.lat && poi.lon) ? 'flex' : 'none';
  stopSpeak();
  document.getElementById('audioProgress').classList.remove('visible');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('copyLabel').textContent = 'Copy for Voice';
  document.getElementById('copyVoiceBtn').classList.remove('copied');
  document.getElementById('detailView').classList.add('open');
  document.querySelector('.detail-scroll').scrollTop = 0;
}

function closeDetail() {
  stopSpeak();
  document.getElementById('detailView').classList.remove('open');
  currentDetailPOI = null;
}

function navigateTo() {
  if (!currentDetailPOI?.lat) return;
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${currentDetailPOI.lat},${currentDetailPOI.lon}&travelmode=walking`, '_blank');
}


// ── Copy for Voice App ──
function copyForVoice() {
  if (!currentDetailPOI) return;
  const text = VOICE_PROMPT + currentDetailPOI.summary;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copyLabel').textContent = 'Copied!';
    document.getElementById('copyVoiceBtn').classList.add('copied');
    setTimeout(() => {
      document.getElementById('copyLabel').textContent = 'Copy for Voice';
      document.getElementById('copyVoiceBtn').classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    document.getElementById('copyLabel').textContent = 'Copied!';
    document.getElementById('copyVoiceBtn').classList.add('copied');
    setTimeout(() => {
      document.getElementById('copyLabel').textContent = 'Copy for Voice';
      document.getElementById('copyVoiceBtn').classList.remove('copied');
    }, 2000);
  });
}


// ── Audio / TTS ──
function toggleSpeak() { isSpeaking ? stopSpeak() : startSpeak(); }

function startSpeak() {
  if (!currentDetailPOI) return;
  stopSpeak();

  // Try pre-generated audio file first
  if (AUDIO_BASE_PATH) {
    const url = AUDIO_BASE_PATH + currentDetailPOI.id + '.mp3';
    currentAudio = new Audio(url);

    currentAudio.addEventListener('canplaythrough', () => {
      currentAudio.play();
      isSpeaking = true;
      updateSpeakUI();
      document.getElementById('audioProgress').classList.add('visible');
    }, { once: true });

    currentAudio.addEventListener('timeupdate', () => {
      if (currentAudio && currentAudio.duration) {
        document.getElementById('progressFill').style.width =
          (currentAudio.currentTime / currentAudio.duration * 100) + '%';
      }
    });

    currentAudio.addEventListener('ended', () => {
      isSpeaking = false;
      updateSpeakUI();
    });

    currentAudio.addEventListener('error', () => {
      currentAudio = null;
      useBrowserTTS(); // fallback
    });
    return;
  }

  useBrowserTTS();
}

function useBrowserTTS() {
  if (!currentDetailPOI || !window.speechSynthesis) return;
  const text = currentDetailPOI.summary.replace(/\n/g, ' ');
  speechUtterance = new SpeechSynthesisUtterance(text);
  speechUtterance.rate = 0.95;

  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.name.includes('Samantha')) ||
            voices.find(v => v.lang.startsWith('en') && v.localService) ||
            voices.find(v => v.lang.startsWith('en'));
  if (v) speechUtterance.voice = v;

  speechUtterance.onend = () => { isSpeaking = false; updateSpeakUI(); };
  speechSynthesis.speak(speechUtterance);
  isSpeaking = true;
  updateSpeakUI();
}

function stopSpeak() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
    document.getElementById('audioProgress').classList.remove('visible');
  }
  if (window.speechSynthesis && (speechSynthesis.speaking || speechSynthesis.pending)) {
    speechSynthesis.cancel();
  }
  isSpeaking = false;
  speechUtterance = null;
  updateSpeakUI();
}

function updateSpeakUI() {
  const btn = document.getElementById('speakBtn');
  const icon = document.getElementById('speakIcon');
  const label = document.getElementById('speakLabel');
  document.getElementById('gpsDot').classList.toggle('speaking', isSpeaking);
  if (isSpeaking) {
    btn.classList.add('speaking-btn');
    btn.classList.remove('primary');
    icon.textContent = '⏸'; label.textContent = 'Stop';
  } else {
    btn.classList.remove('speaking-btn');
    btn.classList.add('primary');
    icon.textContent = '🔊'; label.textContent = 'Listen';
  }
}

if (window.speechSynthesis && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => {};
}


// ── Init ──
initMap();
renderCards();
startTracking();
</script>
