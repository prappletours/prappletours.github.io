<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pula — Walking Guide</title>
<meta name="theme-color" content="#0a1d1d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg: #0a1d1d;
    --bg2: #0f2b2b;
    --bg3: #163838;
    --card: #122e2e;
    --card-hover: #1a3d3d;
    --accent: #4ecdc4;
    --accent2: #2ab7a9;
    --water: #45b7d1;
    --text: #e8f4f0;
    --text2: #a0c4bc;
    --text3: #6a9e94;
    --orange: #f4a261;
    --red: #e07a5f;
    --green: #81b29a;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  /* ─── CRITICAL: Full-height flex shell, no body scroll ─── */
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    height: 100vh; /* fallback */
    overflow: hidden;
  }

  /* ─── Header: fixed, never scrolls ─── */
  .header {
    flex: 0 0 auto;
    background: var(--bg);
    padding: 10px 16px 8px;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    background: linear-gradient(135deg, var(--accent), var(--water));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .map-toggle {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    font-family: inherit;
  }
  .map-toggle.active { color: var(--accent); border-color: rgba(78,205,196,0.3); }

  .header-buttons {
    display: flex;
    gap: 4px;
  }
  .refresh-btn {
    font-size: 14px;
    color: var(--text3);
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 8px;
    padding: 4px 8px;
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
  }
  .refresh-btn.spinning { animation: spin 0.8s ease; }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Fullscreen map mode */
  .map-container.fullscreen {
    position: fixed;
    inset: 0;
    height: 100% !important;
    padding: 0 !important;
    z-index: 150;
    opacity: 1;
  }
  .map-container.fullscreen #map {
    border-radius: 0;
    border: none;
  }
  .map-close-btn {
    position: fixed;
    top: 12px; right: 12px;
    z-index: 160;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--bg3);
    color: var(--text);
    font-size: 18px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    font-family: inherit;
  }
  .map-close-btn.visible { display: flex; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    font-size: 11px;
    color: var(--text3);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.speaking { background: var(--orange); box-shadow: 0 0 6px var(--orange); animation: pulse 1.2s ease infinite; }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(1.4); }
  }

  /* ─── Map: fixed height, collapsible, never scrolls ─── */
  .map-container {
    flex: 0 0 auto;
    height: 180px;
    padding: 0 12px 6px;
    transition: height 0.3s ease, padding 0.3s ease, opacity 0.2s ease;
    overflow: hidden;
  }
  .map-container.collapsed {
    height: 0;
    padding: 0 12px 0;
    opacity: 0;
    pointer-events: none;
  }
  #map {
    width: 100%;
    height: 100%;
    border-radius: var(--radius);
    border: 1px solid var(--bg3);
  }
  .leaflet-container {
    background: var(--bg2);
    touch-action: none; /* prevent map from capturing page scroll */
  }

  /* ─── Tabs: fixed, never scrolls ─── */
  .tabs {
    flex: 0 0 auto;
    display: flex;
    padding: 0 12px 8px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 9px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab.active {
    color: var(--accent);
    background: var(--bg3);
    border-color: var(--accent);
  }

  /* ─── CRITICAL: This is the ONLY scrollable area ─── */
  .scroll-area {
    flex: 1 1 0;
    min-height: 0; /* allows flex child to shrink below content */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 12px 24px;
  }

  /* ─── Cards ─── */
  .card {
    background: var(--card);
    border: 1px solid var(--bg3);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:active { background: var(--card-hover); }
  .card.nearby { border-color: rgba(78,205,196,0.3); }
  .card.nearby::before { opacity: 1; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 4px;
  }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    line-height: 1.3;
    flex: 1;
  }
  .card-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-distance { background: rgba(78,205,196,0.15); color: var(--accent); }
  .badge-category { background: rgba(244,162,97,0.15); color: var(--orange); }
  .card-oneliner { font-size: 13px; color: var(--text2); line-height: 1.4; }

  /* ─── Detail overlay: full screen, own scroll ─── */
  .detail-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: none;
    flex-direction: column;
  }
  .detail-overlay.open { display: flex; }

  .detail-header {
    flex: 0 0 auto;
    background: var(--bg);
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--bg3);
  }
  .detail-back {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid rgba(78,205,196,0.2);
    color: var(--text);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
  }
  .detail-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    flex: 1;
    line-height: 1.3;
  }

  .detail-actions {
    flex: 0 0 auto;
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    flex-wrap: wrap;
  }
  .action-btn {
    flex: 1;
    min-width: 0;
    padding: 10px 6px;
    border-radius: 10px;
    border: 1px solid var(--bg3);
    background: var(--bg2);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .action-btn.primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-color: var(--accent);
    color: var(--bg);
  }
  .action-btn.speaking-btn {
    background: var(--orange);
    border-color: var(--orange);
    color: var(--bg);
  }
  .action-btn.copied {
    background: var(--green);
    border-color: var(--green);
    color: var(--bg);
  }

  /* Audio progress */
  .audio-progress {
    flex: 0 0 auto;
    padding: 0 16px 4px;
    display: none;
  }
  .audio-progress.visible { display: block; }
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s linear;
  }

  .detail-scroll {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 20px 40px;
  }
  .detail-scroll p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text2);
    margin-bottom: 14px;
  }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 20px; left: 12px; right: 12px;
    z-index: 300;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: none;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    cursor: pointer;
    animation: toastIn 0.3s ease;
  }
  .toast.show { display: flex; }
  @keyframes toastIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .toast-icon {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(78,205,196,0.15);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .toast-text { flex: 1; }
  .toast-title { font-weight: 600; font-size: 13px; }
  .toast-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ─── Leaflet marker styles ─── */
  .user-marker {
    width: 14px; height: 14px;
    background: var(--accent);
    border: 3px solid var(--bg);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
  }
  .poi-marker {
    width: 20px; height: 20px;
    background: var(--orange);
    border: 2px solid var(--bg);
    border-radius: 50%;
    opacity: 0.85;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="app-shell">

  <div class="header">
    <div class="header-row">
      <h1>Pula</h1>
      <div class="header-buttons">
        <button class="refresh-btn" id="refreshBtn" onclick="refreshLocation()" title="Refresh location">↻</button>
        <button class="map-toggle" id="fullscreenBtn" onclick="toggleFullscreenMap()">⛶</button>
        <button class="map-toggle active" id="mapToggle" onclick="toggleMap()">Map ▾</button>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="gpsDot"></div>
      <span id="gpsStatus">Waiting for location…</span>
      <span style="margin-left:auto" id="nearbyCount"></span>
    </div>
  </div>

  <div class="map-container" id="mapContainer">
    <div id="map"></div>
  </div>
  <button class="map-close-btn" id="mapCloseBtn" onclick="toggleFullscreenMap()">✕</button>

  <div class="tabs">
    <div class="tab active" data-tab="nearby" onclick="switchTab('nearby')">📍 Nearby</div>
    <div class="tab" data-tab="general" onclick="switchTab('general')">📖 General</div>
  </div>

  <div class="scroll-area" id="scrollArea"></div>

</div>

<div class="detail-overlay" id="detailView">
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail()">←</button>
    <div class="detail-title" id="detailTitle"></div>
  </div>
  <div class="detail-actions">
    <button class="action-btn primary" id="speakBtn" onclick="toggleSpeak()">
      <span id="speakIcon">🔊</span> <span id="speakLabel">Listen</span>
    </button>
    <button class="action-btn" id="copyVoiceBtn" onclick="copyForVoice()">
      📋 <span id="copyLabel">Copy for Voice</span>
    </button>
    <button class="action-btn" id="navBtn" onclick="navigateTo()" style="display:none">
      🧭 Navigate
    </button>
  </div>
  <div class="audio-progress" id="audioProgress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="detail-scroll" id="detailBody"></div>
</div>

<div class="toast" id="toast" onclick="onToastTap()">
  <div class="toast-icon">📍</div>
  <div class="toast-text">
    <div class="toast-title" id="toastTitle"></div>
    <div class="toast-sub" id="toastSub">Tap to learn more</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG — Change these for your setup
// ═══════════════════════════════════════════════════

// Prompt prepended when user taps "Copy for Voice" to paste into

const VOICE_PROMPT = "Read the following aloud in a warm, engaging, conversational tone — as if you're a knowledgeable friend walking with me through a national park. Keep it natural, not performative:\n\n";

const NOTIFY_RADIUS = 100;
const NEARBY_HIGHLIGHT = 150;


// ═══════════════════════════════════════════════════

const POI_DATA =  {
  "located": [
    {
      "id": "pula_arena",
      "name": "Pula Arena",
      "lat": 44.8731,

      "one_liner": "The sixth largest Roman amphitheater in the world, still in active use.",
      "summary": "The Pula Arena is the sixth largest surviving Roman amphitheater in the world, and the only one anywhere to have retained all four of its external towers along with its complete outer wall circuit. Construction began around 27 BC under Emperor Augustus, in the years immediately after the decisive Battle of Actium ended nearly a century of Roman civil war, and the project was finished under Emperor Vespasian around 68 AD — roughly the same decade that Vespasian broke ground on the Colosseum in Rome. You are looking at something older than the Colosseum by several decades.\n\nThe dimensions are precise and worth holding in mind as you stand here. The ellipse measures 132.45 meters along the longer axis and 105.10 meters across the shorter. The sea-facing western wall rises to 32.45 meters over four storeys; the eastern side, where the natural hillside already provides elevation, shows only two storeys above ground. The exterior presents 72 semicircular arches on each of the first two floors and 64 rectangular openings on the third. Everything is Istrian limestone, quarried at Vinkuran a few kilometers southeast of the city, and the massive blocks were set without mortar — standard Roman practice for monumental construction. Mortar appears only in later restoration phases.\n\nThe four rectangular towers integrated into the outer wall define this building's character. Each contained a wooden staircase for upper gallery access, and inside each tower sat two cisterns filled with perfumed water. This water fed fountains and could also be sprayed onto spectators — a detail that says something about what Roman civic engineering considered important. Above the third storey, stone sockets held wooden masts supporting the velarium, a vast canvas awning that could shade the entire cavea, which at full capacity held around 23,000 people. Beneath the arena floor runs a vaulted hypogeum, partly carved from bedrock, which housed animal cages, mechanical equipment, and staging props. A drainage network channeled waste and rainwater directly to the sea, protecting the foundations from erosion. Near the south entrance — the principal gate, facing the city — stood a small altar to Nemesis. Evidence for a sanctuary to Mithras survives at the western end.\n\nGladiatorial combat was officially banned by Emperor Honorius in the early fifth century, but combat between condemned prisoners and animals continued until 681 AD. The arena then served as pastureland through the Middle Ages, interrupted occasionally by tournaments staged by the Knights of Malta. In 1583, the Venetian Senate voted to dismantle the entire structure and ship the stone to Venice; Senator Gabriele Emo led the opposition, and a memorial plaque to him still marks the northwest tower. Stone was taken for Pula Cathedral's bell tower foundations in 1789 — the last documented act of structural pilfering — and serious modern restoration began in 1816 under the Austrian architect Pietro Nobile.\n\nSince 1932, the arena has functioned continuously as a live venue. Modern capacity sits between five and seven thousand seated. The Pula Film Festival, which began in 1954, and major international concerts have turned this ancient killing ground into one of Croatia's most distinctive cultural stages. The underground passages house a permanent exhibition on Istrian viticulture and olive oil production during the Roman period."
    },
    {
      "id": "forum_square",
      "name": "Forum Square",
      "lat": 44.8693,
      "lon": 13.8485,
      "category": "History",
      "one_liner": "Pula's main square, continuously used as a civic center for 2,000 years.",
      "summary": "The Forum of Pula has functioned as the central gathering place of this city for approximately two thousand years without meaningful interruption. Roman magistrates, medieval guild masters, Venetian provveditori, and Austro-Hungarian naval officers all conducted public business here. The café tables are a modern addition; the impulse to gather on this specific ground is not.\n\nThe square was laid out in the early Augustan period, sometime in the first century BC, and it measures roughly 82 meters in length by 38 meters wide. To create this level platform close to the harbor, Roman engineers backfilled part of the shoreline — a direct intervention in the coastal topography that pushed usable land further toward the sea. The northern edge, raised on a terrace, held three temples in a row. The central one was dedicated to the Capitoline Triad, Jupiter, Juno, and Minerva, and has been entirely lost. The flanking temples survived differently: the Temple of Augustus to the left still stands in near-complete condition, while the Temple of Diana to the right was incorporated into the Communal Palace in the thirteenth century, its rear wall still visible in the Palace's fabric. The remaining three sides of the Forum were lined with colonnaded porticoes giving access to the basilica, administrative offices, and shops.\n\nThe Communal Palace, which closes the southern end of this square, is itself a document of the city's successive occupations. Its core was built in 1296 when Pula achieved the status of a free municipality. Later additions overlaid the original Romanesque structure with Gothic arched windows, Renaissance columns, and baroque decorative elements, producing a facade that catalogues the city's ruling powers across seven centuries. Look for the sculpted figures of a Telamon and a Siren at the corners. The rear wall of the ancient Diana temple is still incorporated within the Palace's structure — you can identify it by the shift in stonework.\n\nExcavations below and around the Forum have repeatedly confirmed that the ground was modified and raised progressively through the Roman and post-Roman periods. The paving you are crossing contains Roman stone beneath, and in places the original Roman slabs are intact under later surfaces. The Forum remained politically continuous through Byzantine governance, the Frankish domain, the Patriarchate of Aquileia, and Venetian rule from 1331 to 1797. Dante Alighieri visited Pula in the late thirteenth or early fourteenth century and named the city in the Divine Comedy — the lines refer specifically to the landscape near the bay.\n\nThe open-air quality of the Forum today reflects its original design intent: a space that was simultaneously commercial, judicial, religious, and social, where the ordinary life of the city was performed in public. Festivals, legal proceedings, religious processions, and everyday commerce all occurred here. What you see now, with people eating and drinking at tables while the Temple of Augustus looks on, is structurally not so different from what this place was built to enable."
    },
    {
      "id": "temple_of_augustus",
      "name": "Temple of Augustus",
      "lat": 44.8696,
      "lon": 13.8487,
      "category": "Architecture",
      "one_liner": "One of the best-preserved Roman temples outside Italy, built while Augustus still lived.",
      "summary": "The Temple of Augustus stands at the northwestern end of Pula's Forum, and its survival across two thousand years of repurposing, fire, war, and reconstruction makes it one of the most resilient objects in this part of the Adriatic. What you are looking at was built between 2 BC and 14 AD — the inscription dating is quite precise, because the bronze dedication nailed to the architrave used the title Pater Patriae, Father of the Fatherland, a title the Senate voted to Augustus in 2 BC, and because it does not use the term Divus, the Deified, which would only apply after his death. The temple was therefore raised in honor of a living emperor, not a posthumous cult figure, making it a monument to imperial ambition in real time.\n\nThe dedication, reconstructed from the fixing holes where bronze letters once sat, read in full: ROMAE ET AUGUSTO CAESARI DIVI FILIO PATRI PATRIAE — to Rome and to Augustus Caesar, son of the divine, father of the fatherland. The co-dedication to Roma, the divine personification of the city itself, was standard Augustan practice in the provinces, a way of linking provincial loyalty to the metropolitan center.\n\nThe building stands on a raised podium accessible by a single flight of steps at the front. The facade is tetrastyle prostyle: four freestanding Corinthian columns across the front, with a half-column engaged to each side wall where it meets the porch. Overall dimensions are 17.65 meters long, 8.5 meters wide, and 13.17 meters to the peak of the pediment — compact for what it represents, but imposing when encountered from across a square this size. The frieze running along the entablature is carved with acanthus scrolls, fruits, and birds; its quality and composition are closely related to the frieze of the Maison Carrée in Nîmes, France, built several decades earlier, suggesting that both drew on the same design traditions circulating through the highest levels of Augustan patronage.\n\nThe interior, the cella, originally housed cult statues of Roma and Augustus. It has since served as a Christian church, a grain warehouse, an archive, and since the early nineteenth century, a lapidarium. A WWII bomb strike in 1945 destroyed much of the structure; Italian archaeologists reconstructed it between 1945 and 1947, working from careful documentation. The western interior wall, made of crushed limestone rather than the cut stone used elsewhere, dates from an eighteenth-century repair. In 1570, the Renaissance architect Andrea Palladio documented the temple in his treatise I Quattro Libri dell'Architettura as an example of ideal Roman temple proportions — which helps explain why its influence on later European architecture was disproportionate to its modest size.\n\nThe small exhibition inside today presents Roman portrait sculpture, inscriptions, and bronzes found in and around Pula. Together, the temple and the Maison Carrée in Nîmes are considered the two most completely preserved Roman temples outside the Italian peninsula."
    },
    {
      "id": "arch_of_the_sergii",
      "name": "Arch of the Sergii",
      "lat": 44.8682,
      "lon": 13.8500,
      "category": "History",
      "one_liner": "A private Roman triumphal arch from 27 BC, the oldest of its type still standing.",
      "summary": "The Arch of the Sergii was built somewhere between 29 and 27 BC, making it arguably the oldest surviving Roman triumphal arch anywhere. It was not erected by an emperor or a general celebrating an imperial campaign. It was commissioned by a woman, Salvia Postuma Sergia, using her private funds, to honor three men from her family: her husband Lucius Sergius Lepidus, his father Lucius Sergius, and his uncle Gaius Sergius. The inscription is explicit on the point of funding. The Lex Iulia de Maritandis Ordinibus, a law allowing upper-class Roman women to control inherited wealth if they had borne a sufficient number of children, gave Salvia the legal standing to underwrite a monument of this scale. The arch is one of the earliest documented examples of female public euergetism — private wealth deployed for civic purposes — anywhere in the Roman world.\n\nThe occasion was the Battle of Actium in 31 BC, the naval engagement in which Octavian, the future Augustus, destroyed the combined fleet of Mark Antony and Cleopatra in the Ionian Sea. Lucius Sergius Lepidus served as a tribune in the Twenty-ninth Legion, which fought at Actium and was dissolved in 27 BC when its men were discharged. The arch celebrates this service and the family's standing as leading figures in the Roman colony at Pula.\n\nThe structure stands approximately 8 meters high and carries a single barrel-vaulted passageway. Originally it formed part of the eastern city gate, the Porta Aurea — the Golden Gate — embedded in the circuit of Pula's defensive walls. The gate and walls were demolished in 1829 to accommodate urban expansion, leaving the arch standing alone in what is now a small square at the entrance to the old town pedestrian zone. The back of the arch, which faced inward toward the city, is plainly finished, because it was never intended to be seen; the western face, which greeted arrivals from the road, received all the ornamental attention.\n\nThat western face repays close inspection. Four Corinthian columns on pilasters frame the arch opening. In the spandrels, carved winged victories carry garlands. The passage ceiling is decorated with an eagle clutching a snake, sea creatures, and sphinxes. The frieze above carries a triumphal procession, and carved along the sides are bucrania — the sculpted skulls of sacrificial oxen — alternating with garlands, a combination common in late Republican and early Augustan decoration that shows strong Hellenistic influence filtered through Asia Minor. Three statue bases on the attic once carried bronze figures of the three men being honored. Only the bases survive.\n\nThe arch is free to approach at any hour. Its position at the threshold of the old town means that most people who enter the historic core pass beneath it, consciously or not, which is precisely what the Sergii intended."
    },
    {
      "id": "twin_gate",
      "name": "Twin Gate (Porta Gemina)",
      "lat": 44.8706,
      "lon": 13.8518,
      "category": "Architecture",
      "one_liner": "A double-arched Roman city gate from the late second century, with its portcullis slots intact.",
      "summary": "The Porta Gemina, the Twin Gate, was built in the late second century AD, probably under the Antonine or Severan emperors — a period roughly contemporary with the height of Stoic philosophy in Rome, when Marcus Aurelius was writing his Meditations. It replaced an older gate on the same site and served as one of ten entry points in the circuit of walls that surrounded Roman Pula. Three of those ten gates survive today; this is the most architecturally complete.\n\nThe structure takes its name from its defining feature: two semi-circular arches sitting side by side in a single continuous facade. Between and flanking the arches stand three pilasters with composite capitals — a hybrid of Ionic volutes and Corinthian acanthus — supporting a plain architrave below and an ornate frieze above. Above the arches, the wall preserves the slots for the portcullis, the iron or wooden lattice grating that could be lowered to seal the gate. These slots are still clearly visible if you look up. The presence of both arches and portcullis machinery indicates that this was a functioning controlled entry point, not merely a ceremonial passage.\n\nA marble plate set into the upper central section of the gate records the name of Lucius Menacius Priscus, a local town councilman and senator, who funded construction of one of Pula's water supply networks at personal expense. The plate was not originally part of the gate; it was found nearby in 1831 during excavation and installed in its present position in 1857 by the Pula antiquarian Pietro Kandler, who recognized its historical relevance even if it disrupted strict archaeological sequence. The inscription is a reminder that Roman civic infrastructure — aqueducts, roads, sewers — was routinely funded by wealthy individuals in exchange for lasting public recognition, a social contract quite different from modern state provision.\n\nDuring the Middle Ages, the gate and much of the surrounding wall were deliberately buried to strengthen the defensive line of the town. The fill brought the ground level up past the lower arches, and the gate effectively disappeared from sight, remaining underground until the early nineteenth century when the upper sections reappeared and prompted systematic excavation. The surrounding walls were subsequently demolished to clear space for the expanding city, leaving the gate as an isolated monument adjacent to what is now Carrarina Street.\n\nFrom where you stand, notice the path toward the hill behind the gate. In Roman times, this road led directly to the Small Roman Theatre, on the slope below the fortress hill. The Twin Gate functioned not just as a defensive threshold but as the formal entrance to one of the city's main entertainment venues. The Archaeological Museum of Istria, a late nineteenth-century building in neo-classical style built on the site of a former school, now stands between the gate and the theatre, with excavated Roman stonework visible in its garden."
    },
    {
      "id": "gate_of_hercules",
      "name": "Gate of Hercules",
      "lat": 44.8713,
      "lon": 13.8519,
      "category": "History",
      "one_liner": "The oldest Roman structure in Pula, built at the city's founding in 47–44 BC.",
      "summary": "The Gate of Hercules is the oldest surviving Roman structure in Pula, predating the Arena by roughly seventy years, and its inscription links it directly to the founding of the city as a Roman colony. Look up at the keystone of the arch and you will see a carved relief of Hercules's head, with his knotted club set to one side — modest in scale, worn by two thousand years of exposure, but still legible. Below the head, cut into the stone, are the names of two Roman officials: Lucius Calpurnius Piso and Gaius Cassius Longinus, identified by the historical record as the men sent by the Roman Senate to establish the colony of Pietas Iulia Pola between 47 and 44 BC.\n\nThe choice of names carries particular weight. Calpurnius Piso, according to ancient sources, was the father-in-law of Julius Caesar, whose daughter Calpurnia was Piso's child. Cassius Longinus was the brother and namesake of Gaius Cassius Longinus, one of the principal conspirators in Caesar's assassination in 44 BC. These were men operating at the very center of late Republican Roman politics in one of the most unstable decades the Republic had ever seen. Caesar was murdered in 44 BC; this gate was being built during or shortly before that event. The colony of Pula was being founded at the exact moment the Roman world was entering the final crisis that would end the Republic and produce the Empire under Augustus.\n\nArchitecturally, the gate is plain. The arch itself is built from large uncarved limestone blocks, consistent with the utilitarian style of Roman boundary and defensive structures at this period — no engaged columns, no decorative frieze, no elaborate inscription plaque. The gate was not designed to impress from the outside; it did not need to be. Its role was functional and administrative. Since the main road through this gate followed the upper circular street of the town at an oblique angle to the wall direction, the axis of the passage is not perpendicular to the wall face — a subtle irregularity that reflects the practical demands of the existing topography over the ideals of Roman symmetry.\n\nThe gate is flanked today by two medieval towers of noticeably different stonework, added during later defensive improvements. The contrast between the rough, blocky Roman arch and the higher medieval masonry on either side is immediate and instructive. This small corner of Pula presents several centuries of building practice in a few square meters.\n\nThe gate is easily missed. It sits between buildings in a part of the old town where the streets narrow, and there is no large open space in front of it. The inscription panel is partially damaged — enough of the text survives to make identification possible, but a section covering what may have been an important additional dedication has been lost. What remains is more than enough: a direct physical connection to the first act of Roman urban planning at this site."
    },
    {
      "id": "small_roman_theatre",
      "name": "Small Roman Theatre",
      "lat": 44.8718,
      "lon": 13.8536,
      "category": "History",
      "one_liner": "A first-century BC theatre carved into the hillside, originally seating the entire city's population.",
      "summary": "The Small Roman Theatre was built in the early Augustan period, in the third quarter of the first century BC, on the eastern and northeastern slopes of the central city hill just below the old fortified hilltop. It is one of two theatres that Pula possessed during the Roman period — the second and larger theatre stood outside the city walls on the Monte Zara slope and has largely been lost — and it is the only one to survive in identifiable physical form. Along with the Arena, this theatre and its vanished companion gave Roman Pula three major entertainment venues simultaneously, a provision unusual for a provincial city of this size and one that indicates considerable civic investment and ambition.\n\nThe design follows the Greek model rather than the purely Roman one: the cavea, the semicircular seating area, was carved directly into the hillside rather than constructed on a freestanding substructure, using the slope to provide the grade naturally. The main construction material was local Istrian limestone, with marble cladding applied to the lower sections of the interior walls and the upper surfaces finished in plaster and pigment, probably including painted scenes. The auditorium, the orchestra pit, and the proscaenium where actors performed were all present in the original design. Capacity estimates range from three to five thousand, which is significant because the population of Roman Pula at its height was probably not much larger than that figure — meaning a full house at this theatre would have contained something close to the entire urban population.\n\nUnlike the Arena, which staged gladiatorial combat, animal hunts, and public executions, the theatre was built for drama, recitation, and musical performance. These were distinct civic functions, and the Romans maintained both in the same city precisely because public entertainment served multiple social and political purposes simultaneously: spectacle and violence at the arena, rhetoric and art at the theatres.\n\nMuch of the original structure was lost gradually after the Roman period. Only the stage foundations and fragments of the semicircular seating remain visible. A major EU-funded conservation and reconstruction project between 2020 and 2022 stabilized the surviving fabric, partially restored the seating terraces using steel armatures to distinguish new work from original stone, and adapted the space for contemporary use. Modern capacity is approximately 1,250. The Archaeological Museum of Istria, which stands immediately in front of the theatre complex, incorporates a large LED screen on its rear facade for projecting imagery during evening performances — a jarring but functional piece of infrastructure when seen in daylight, and more legible as a backdrop at night.\n\nFrom where you are standing, look up toward the fortress on the hill above. The relationship between the theatre, the defensive hilltop, and the gate system below reflects the layered planning of the Roman town, where entertainment, defense, and daily movement all had their defined spatial zones within a few hundred meters of one another."
    },
    {
      "id": "pula_cathedral",
      "name": "Cathedral of the Assumption of the Blessed Virgin Mary",
      "lat": 44.8699,
      "lon": 13.8479,
      "category": "Religious",
      "one_liner": "Pula's cathedral, built on Roman foundations, with a bell tower made from Arena stone.",
      "summary": "The Cathedral of the Assumption of the Blessed Virgin Mary stands near the southern shore of the bay, on a site that has supported religious architecture since antiquity. The ground beneath the current building is believed to have held a Roman temple, possibly dedicated to Jupiter Conservator, before the Christian period. The first churches on the site were raised in the late fourth and early fifth century, a period when Pula was emerging as an episcopal center following the Edict of Thessalonica in 380 AD, which established Christianity as the official religion of the Roman Empire and effectively ended legal pagan worship. The cathedral as an institution dates to around 425 AD, when Pula formally became the seat of a bishopric.\n\nThe building you see today is the product of continuous modification across more than fifteen centuries. Some stretches of the outer walls date to the fourth century. Fragments of fifth- and sixth-century floor mosaics survive inside, including an intact section bearing the inscription DAMIANUS ET LAVRENTIA — the names of a couple who paid for the mosaic as part of their wedding vows, an early Christian practice of commemoration through patronage. The main altar is a repurposed Roman sarcophagus, thought to hold the relics of third-century martyrs. During excavations in 1860, a grave was found inside the church containing a silver reliquary box decorated with images of early Christian saints; inside it was a smaller golden box believed to have held relics of Thomas the Apostle, probably brought to Pula from Constantinople in the fifth century. That reliquary is now at the Kunsthistorisches Museum in Vienna.\n\nThe building suffered heavy damage in a Venetian and Genoese raid in 1242 and was substantially rebuilt in the fifteenth century, when the sacristy was added and the Gothic windows in the aisles replaced fire-damaged openings. The present classicist facade dates to 1712, ordered by Bishop Bottari. The freestanding baroque bell tower to the right of the entrance was added in 1707. Its construction used stone taken directly from the Pula Arena — a transaction that was still considered acceptable in the early eighteenth century, when the arena's preservation was less secure than it later became, and which explains a visible inconsistency in the tower's stonework at the lower courses.\n\nThe interior is spare by the standards of Mediterranean baroque: long nave, plain walls, a painted ceiling. In 1675, five Roman sarcophagi were found beneath the main altar containing bones identified as those of several early Christian saints, along with the remains of Solomon, King of Hungary, who ruled from 1063 to 1074 and whose death and burial in Pula reflects the city's broader connections across the medieval Adriatic world. The cathedral was bombed in 1945 and repaired by 1947. It remains the active seat of the Pula-Poreč diocese."
    },
    {
      "id": "fort_stoja",
      "name": "Fort Stoja",
      "lat": 44.8520,
      "lon": 13.8100,
      "category": "History",
      "one_liner": "An Austro-Hungarian coastal fortress from 1860, guarding the southern approaches to Pula's harbor.",
      "summary": "Fort Stoja sits on the Stoja peninsula approximately three kilometers west-southwest of Pula's old town, at an elevation of about fifteen meters above the Adriatic. It is a polygonal armored coastal fort, a type developed in the mid-nineteenth century as artillery power grew to render older rounded fortifications obsolete. Construction began in 1859 and 1860 and was extended in phases through 1869, 1885, 1909, and 1914, producing a structure approximately 135 meters in length adapted to successive improvements in naval gunnery. The fort's mission was to control the sea approach to Pula's harbor from the south and southwest.\n\nTo understand why this fort was built at all, the broader story of Pula under Austrian rule matters. After the Napoleonic wars, the Austrian Empire identified Pula Bay as the ideal location for its main Adriatic naval base. The bay is exceptionally well-sheltered, deep enough to handle large warships, and positioned to project power across the northern Adriatic. What had been a small and partly depopulated town was transformed across the nineteenth century into one of the most heavily fortified ports in Europe, with three concentric rings of fortifications, a purpose-built naval arsenal, dry docks, and support infrastructure for what eventually became the Austro-Hungarian Imperial and Royal Navy fleet. By 1900, Pula's population had grown to nearly sixty thousand — from a few thousand in the early 1800s — almost entirely as a result of military and naval construction.\n\nFort Stoja was one of two coastal forts built to protect the harbor mouth from the south, the other being Fort Verudela on the adjacent peninsula. Together they formed an interlocking field of fire across the approaches that any hostile fleet would have to navigate. Tunnels were excavated beneath the fort for storing sea mines and torpedoes. In December 1897, a radio mast was erected here for telegraphic communication — an early adoption of the technology that had only been demonstrated publicly by Marconi the previous year.\n\nThe fort never fired in anger. The Austrian navy engaged in limited operations during the First World War, and the formidable Pula fortification system ultimately served more as deterrent than battlefield. After the war, Italy took possession of Istria under the terms of the 1920 Treaty of Rapallo, and the naval infrastructure passed to the Italian Regia Marina. After the Second World War and the settlement that transferred Istria to Yugoslavia in 1947, the site came under the Yugoslav Navy.\n\nToday the Stoja peninsula is a quiet natural area known for its pine-forested shore, rocky coves, and clear water. The fort itself, managed by the Arena Hospitality Group, can be visited externally. The broad view from this promontory — over the bay toward Brijuni in the north, and south toward the open Adriatic — makes clear why anyone who wanted to control this stretch of sea chose this exact spot."
    },
    {
    "id": "kastel_citadel",
    "name": "Kaštel (Venetian Citadel)",
    "lat": 44.8703,
    "lon": 13.8456,
    "category": "History",
    "one_liner": "A 1630s star fortress on Pula's hilltop, built over three thousand years of continuous fortification.",
    "summary": "The hill you are standing beneath has been occupied by one fortification or another for roughly three thousand years. The Histri built a hillfort here before Roman conquest. The Romans stationed a military garrison and established the acropolis of Pietas Iulia on the same ground. A medieval castle followed, controlled in the thirteenth century by the Castropola family, the dominant patrician clan in medieval Pula, before Venice expelled them to Treviso in 1331 and demolished their stronghold. What you see today was built between 1630 and 1633, replacing all of that.\n\nThe context matters: Pula's Kaštel was commissioned during the Thirty Years War, the catastrophic Central European conflict that killed as many as eight million people between 1618 and 1648 and reshaped the political map of the continent. Venice, worried about Austro-Bavarian pressure and Ottoman naval ambitions in the Adriatic, needed a defensible anchor at its most southerly Istrian port. The Venice Senate engaged Antoine de Ville, a military engineer originally from Toulouse, who was at the time one of the most sought-after fortification designers in Europe. His other works included fortifications at Lyon and several projects for the French crown. De Ville designed the Kaštel as a trace italienne fortress in a star plan: a rectangular central core with four angular pentagonal bastions projecting outward at each corner, their angled faces designed to deflect cannon fire and eliminate dead ground. Each bastion carried the name of a Venetian patrician family. Construction used stone quarried from the ruins of the Large Roman Theatre on the nearby Monte Zaro slope, which was largely consumed by the project and survives today only in scattered fragments.\n\nThe fortress sat at the center of a broader Venetian defensive system that also included two embankment lines — roughly following today's Castropola Street and the outer perimeter of the medieval walls — and a fort on St. Andrew's island in the bay. In the early seventeenth century, before steam-powered vessels and rifled artillery, this was a credible deterrent. With the Peace of Westphalia in 1648 and the end of the Thirty Years War, the urgency passed, and maintenance became irregular. Austria took over the fortress in 1797, renamed it the Hafenkastell, and converted it into barracks, an observation post, ammunition storage, and a prison. A water cistern was added to the outer north wall in 1861, making the fortress part of Pula's first modern municipal water supply.\n\nFrom the bastions on a clear day you can identify the Brijuni archipelago to the northwest, the Arena immediately below, the harbor shipyards, and on good days the Kvarner islands to the east. The Historical and Maritime Museum of Istria now occupies the interior, with collections covering Pula and the broader Istrian region from prehistory through the twentieth century. A lift in the adjacent Zerostrasse tunnel system connects directly to the fortress, so the underground and the hilltop can be visited in a single circuit."
  },
  {
    "id": "fort_san_giorgio",
    "name": "Fort San Giorgio (Monte Ghiro)",
    "lat": 44.882,
    "lon": 13.8556,
    "category": "History",
    "one_liner": "A mid-19th century circular Austrian artillery tower, the northernmost fort in Pula's city ring.",
    "summary": "Fort San Giorgio sits on the hill of Monte Ghiro at 51 meters above sea level, close to Pula's city cemetery. It is the northernmost fort in the chain of circular artillery towers that the Austrian Empire built across the hills encircling Pula between 1852 and 1856 — the first concentrated phase of fortification after the decision was made to develop Pula as the primary naval base of the Habsburg fleet. The chain continues south from here with Fort Monvidal, Fort San Michele, and eventually Fort Casoni Vecchi and Fort Bourguignon at the southern end of the arc.\n\nAll the forts in this inner ring share the same basic typology: circular towers of carefully dressed limestone, roughly 34 meters in diameter, designed to mount artillery around their perimeters and resist bombardment from the surrounding terrain. The circular form was a deliberate adaptation of the Martello tower concept developed in the Napoleonic wars, scaled up and made permanent. Fort San Giorgio was built between 1852 and 1854, with modifications in 1914 when the Austrian military added improvements in response to the evolving nature of First World War artillery.\n\nAt the heart of the fort is a round courtyard with a central cistern — the self-sufficiency of these structures in case of siege was a design requirement. The entrance passes through a protected vestibule designed to slow and channel any attackers who breached the outer gate. The fort contains 16 casemates, the vaulted chambers cut into the thickness of the walls that provided protected positions for cannon crews. Most were intended as artillery positions; records suggest that in the original design, only one casemate was assigned a non-combat function.\n\nBy the 1880s and 1890s, the rapid development of rifled breech-loading artillery had rendered towers of this height obsolete as fighting positions — they were too exposed to direct fire from modern guns that could be placed beyond visual range. The inner ring of circular forts was progressively demoted from active defense to secondary functions: observation, supply storage, barracks, and communication. The outer ring of polygonal and armored forts built from the 1860s onward became the actual fighting positions.\n\nThe exterior of Fort San Giorgio is accessible and can be walked around. The interior has been closed to visitors for most of the post-war period, though the stonework is visible and the architectural form is fully legible from outside. The motto of the Italian 74th Infantry Regiment, Sempre avanti ad ogni costo — Always forward at any cost — was carved into the entrance during the Italian occupation between the wars, a reminder of the layered military history embedded in these structures. The fort is surrounded by paths used by local dog walkers and runners, and the overgrown vegetation of the surrounding slope gives it a more romantic and melancholy character than the more accessible forts elsewhere in the system."
  },
  {
    "id": "fort_casoni_vecchi",
    "name": "Fort Casoni Vecchi",
    "lat": 44.8638,
    "lon": 13.854,
    "category": "History",
    "one_liner": "An 1852 Austrian circular fort, once a punk festival venue, now hosting cultural events.",
    "summary": "Fort Casoni Vecchi stands on Vidikovac hill at 55 meters above sea level, toward the southern end of the chain of circular forts the Austrian Empire built across Pula's hills between 1852 and 1856. Like its counterparts San Giorgio to the north and Bourguignon to the south, it is a circular artillery tower roughly 34 meters in diameter, built from dressed Istrian limestone in the mid-century defensive typology that the Habsburg military adopted as its standard first response to the new gunpowder threats. Construction ran from 1852 to 1854, with modifications in 1914.\n\nThe fort contains sixteen casemates in the thickness of its outer wall, all but one positioned as artillery emplacements directed outward over the surrounding terrain. In the event of siege, the internal cistern system provided independent water supply. This self-sufficiency was a standard design requirement for the entire generation of circular forts: they were conceived as nodes in a distributed defensive network that could hold individually even if the surrounding positions fell. The practical reality was that by the time construction was complete, advances in rifled artillery were already making the high-profile circular form strategically questionable, and within two decades the more powerful outer ring of polygonal forts had superseded the city ring in actual military importance.\n\nCasoni Vecchi translates roughly as Old Barracks or Old Houses, a name that suggests the hill was already associated with military use before the Austrian fort was built. The site is protected as cultural heritage under Croatian law, which limits but does not prevent modification or adaptive reuse. The fort gained an unlikely second life in the 1990s when it hosted the Monte Paradiso punk music festival — raw concrete and stone chambers, natural acoustic oddity, and a degree of institutional indifference made it a compelling venue for a subculture that tends to find use in abandoned infrastructure. The festival is no longer active at this location.\n\nIn recent years, a local civic association, Udruga Casoni Vecchi, took over maintenance and programming of the fort on a voluntary basis under agreement with the City of Pula. With minimal external funding, the association has organized exhibitions, concerts, and community events in the courtyard and casemates, working against the momentum of neglect that has affected most of Pula's inner ring forts. The interior is intermittently accessible for events and occasionally for group visits. The hillside location offers one of the better elevated views over the southern bay and the Verudela peninsula. The contrast between the ruined stonework, the overgrown slopes, and the visible Adriatic below gives the site a character quite different from the more formally managed forts."
  },
  {
    "id": "zerostrasse",
    "name": "Zerostrasse (Underground Tunnels)",
    "lat": 44.8705,
    "lon": 13.8474,
    "category": "History",
    "one_liner": "A WWI underground tunnel network beneath Kaštel hill, built to shelter the city's entire population.",
    "summary": "Below the streets and buildings of central Pula runs an extensive network of tunnels, galleries, and chambers built in the years immediately before and during the First World War. The system is known as Zerostrasse, a German-Italian hybrid name meaning roughly Street Level Zero, referring to the subterranean plane on which the underground passages operate. The main entrance accessible to visitors today is at Carrarina Street, just behind the Twin Gates, placing this attraction directly in the middle of the city's most concentrated zone of ancient monuments.\n\nPula at the outbreak of the First World War was the primary naval base of the Austro-Hungarian Empire and housed not only the fleet but a large civilian and military population that worked in the arsenal, the shipyards, the naval hospital, and the administrative infrastructure. Air bombardment had become a realistic threat by 1914 — fixed-wing military aviation was only a decade old, but its potential against fixed installations was already understood. The Austro-Hungarian military responded by drilling into every significant hill in the city center. The hills of Monte Ghiro and Kaštel received the largest tunnel systems. Construction involved blasting and hand excavation through the karst limestone, and the resulting passages were stabilized and lined to create functional shelters.\n\nThe accessible section of Zerostrasse under Kaštel hill is approximately 400 meters long. The passages are 3 to 6 meters wide and about 2.5 meters high, with four entrance shafts on different sides of the hill converging in a central chamber. This cross-shaped layout was not accidental: the entrances were positioned to create through-ventilation, so air temperature in the tunnels remains between 14 and 18 degrees Celsius throughout the year, regardless of external conditions. Side rooms along the corridors served as personnel quarters, kitchens, storage, and four prison cells. The section under Kaštel alone was designed to shelter approximately six thousand people.\n\nAfter the First World War, Italian authorities expanded the network rather than abandoning it. During the Second World War, Allied bombing raids made the tunnels essential again, and sections were adapted as emergency hospitals. Cold War-era additions in the 1950s and 1960s extended the network with fallout shelters — locally called atomic shelters — sized and sealed against radiological contamination. The total shelter capacity of all tunnel systems beneath Pula, including these later additions, reached approximately 50,000 people, nearly matching the city's entire population.\n\nA lift inside the Zerostrasse connects directly upward to the Kaštel fortress, so a single ticket allows a visitor to move from the underground galleries to the bastions with panoramic views above — one of the more striking experiential contrasts available at any historical site in Croatia. The tunnel section currently open to visitors includes a permanent exhibition on the early history of aviation in Pula, a subject that connects directly to why the tunnels were built."
  },
  {
    "id": "church_of_saint_anthony",
    "name": "Church of Saint Anthony of Padua",
    "lat": 44.8742,
    "lon": 13.8497,
    "category": "Religious",
    "one_liner": "A 1931 Franciscan church with a 45-meter bell tower, the tallest structure in Pula.",
    "summary": "The Church of Saint Anthony of Padua is the newest significant religious building in Pula, completed in 1931, and its 45-meter bell tower is the tallest structure in the city. The tower is visible from a wide area including the Arena, the old town, and much of the harbor approach, making the church a navigational landmark even for those who never enter it. Its visual relationship with the nearby Arena — a pagan Roman entertainment structure and a Catholic Franciscan church separated by barely two hundred meters — encapsulates the overlapping temporal layers that define this part of the Adriatic coast.\n\nThe church was designed by Guido Brass, then city architect of Pula, who provided the plans without charge. Construction was funded entirely by parishioner contributions and took two years from the laying of the foundation stone on 4 October 1929, the feast day of Saint Francis, to the blessing of the completed building on 1 November 1931. The opening was reported by the local newspaper Corriere Istriano as the fulfillment of a long-expressed civic desire. The timing of the dedication to Saint Francis is significant: 1931 was the seven hundredth anniversary of Francis's death, making the church's consecration a deliberate commemorative gesture.\n\nThe building stands on a prominent topographic step above the arena waterfront, accessed by an exterior stone staircase that makes use of the sloping terrain. The entrance portico, supported by two columns, gives the facade a degree of formality that the otherwise plain surfaces do not claim. The style is neo-Romanesque, characterized by rounded arches, solid masonry walls, and an emphasis on structural clarity over decorative elaboration. Brass worked in what was then called Historic Revival or Romanesque Revival style — the same broad tradition that shaped numerous civic and ecclesiastical buildings across Austro-Hungarian and early Italian Pula. The interior is a three-aisled basilica with marble paving added in 1936 and a decorated apse constructed in 1939. The decorative program includes frescoes and stained glass that were added progressively through the 1930s and 1940s.\n\nThe Franciscan order was entrusted with the church in 1939. The Franciscans had a long prior history in Pula — the thirteenth-century Franciscan monastery on the western slope of Kaštel hill dates from the early decades after Francis himself is said to have traveled through Istria around 1229, founding religious houses along the Adriatic coast. Napoleon dissolved the Franciscan establishments in Pula in 1806. The Franciscan presence in the city was not reestablished until the 1920s, which is why a community of 60,000 people had only one parish as late as 1929, and why Father Tito Castagna, Provincial of the Venetian Franciscan Province, pushed so energetically for a new church within the city rather than at the suburban Šijana location that had initially been proposed. A small monastery adjoining the church was completed in 1934; a second monastery was added in 1961."
  }

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(m) { return m < 1000 ? Math.round(m)+'m' : (m/1000).toFixed(1)+'km'; }


// ── Map ──
function initMap() {
  leafletMap = L.map('map', {
    center: [44.887, 15.603],
    zoom: 14,
    zoomControl: false,
    attributionControl: false,
    dragging: true,
    scrollWheelZoom: false,
    touchZoom: true
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(leafletMap);

  POI_DATA.located.forEach(poi => {
    const icon = L.divIcon({ className: 'poi-marker', iconSize: [20,20], iconAnchor: [10,10] });
    const m = L.marker([poi.lat, poi.lon], { icon }).addTo(leafletMap);
    m.on('click', () => {
      if (mapFullscreen) toggleFullscreenMap();
      openDetail(poi);
    });
  });
}

function toggleMap() {
  if (mapFullscreen) return;
  mapVisible = !mapVisible;
  const c = document.getElementById('mapContainer');
  const b = document.getElementById('mapToggle');
  c.classList.toggle('collapsed', !mapVisible);
  b.textContent = mapVisible ? 'Map ▾' : 'Map ▸';
  b.classList.toggle('active', mapVisible);
  if (mapVisible) setTimeout(() => leafletMap.invalidateSize(), 350);
}

function toggleFullscreenMap() {
  mapFullscreen = !mapFullscreen;
  const c = document.getElementById('mapContainer');
  const closeBtn = document.getElementById('mapCloseBtn');

  if (mapFullscreen) {
    if (!mapVisible) {
      mapVisible = true;
      c.classList.remove('collapsed');
      document.getElementById('mapToggle').textContent = 'Map ▾';
      document.getElementById('mapToggle').classList.add('active');
    }
    c.classList.add('fullscreen');
    closeBtn.classList.add('visible');
    setTimeout(() => leafletMap.invalidateSize(), 50);
  } else {
    c.classList.remove('fullscreen');
    closeBtn.classList.remove('visible');
    setTimeout(() => leafletMap.invalidateSize(), 350);
  }
}


// ── GPS ──
function updatePosition(lat, lon) {
  userLat = lat;
  userLon = lon;
  document.getElementById('gpsDot').classList.add('active');
  document.getElementById('gpsStatus').textContent = userLat.toFixed(4)+', '+userLon.toFixed(4);

  if (userMarker) { userMarker.setLatLng([userLat, userLon]); }
  else {
    const icon = L.divIcon({ className: 'user-marker', iconSize: [14,14] });
    userMarker = L.marker([userLat, userLon], { icon, zIndexOffset: 1000 }).addTo(leafletMap);
    leafletMap.setView([userLat, userLon], 15);
  }
  checkProximity();
  if (currentTab === 'nearby') renderCards();
}

function startTracking() {
  if (!navigator.geolocation) {
    document.getElementById('gpsStatus').textContent = 'Geolocation not available';
    return;
  }

  // Primary: watchPosition for continuous updates
  navigator.geolocation.watchPosition(
    pos => updatePosition(pos.coords.latitude, pos.coords.longitude),
    () => { document.getElementById('gpsStatus').textContent = 'No GPS — tap ↻ to retry'; },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );

  // Fallback: poll every 30s in case watchPosition silently dies (common on iOS Safari)
  setInterval(() => {
    navigator.geolocation.getCurrentPosition(
      pos => updatePosition(pos.coords.latitude, pos.coords.longitude),
      () => {},
      { enableHighAccuracy: true, maximumAge: 10000, timeout: 10000 }
    );
  }, 30000);
}

function refreshLocation() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 800);

  if (!navigator.geolocation) return;
  document.getElementById('gpsStatus').textContent = 'Updating…';
  navigator.geolocation.getCurrentPosition(
    pos => updatePosition(pos.coords.latitude, pos.coords.longitude),
    () => { document.getElementById('gpsStatus').textContent = 'Location update failed'; },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
  );
}

function checkProximity() {
  if (!userLat) return;
  POI_DATA.located.forEach(poi => {
    const d = haversine(userLat, userLon, poi.lat, poi.lon);
    if (d < NOTIFY_RADIUS && !notifiedPOIs.has(poi.id)) {
      notifiedPOIs.add(poi.id);
      showToast(poi, d);
      if (navigator.vibrate) navigator.vibrate([100,50,100]);
    }
  });
  const nc = POI_DATA.located.filter(p => haversine(userLat,userLon,p.lat,p.lon)<500).length;
  document.getElementById('nearbyCount').textContent = nc > 0 ? nc+' within 500m' : '';
}


// ── Toast ──
function showToast(poi, dist) {
  lastToastPOI = poi;
  document.getElementById('toastTitle').textContent = poi.name;
  document.getElementById('toastSub').textContent = formatDist(dist)+' away — Tap to learn more';
  document.getElementById('toast').classList.add('show');
  setTimeout(() => document.getElementById('toast').classList.remove('show'), 8000);
}
function onToastTap() {
  document.getElementById('toast').classList.remove('show');
  if (lastToastPOI) openDetail(lastToastPOI);
}


// ── Tabs & Cards ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  renderCards();
  document.getElementById('scrollArea').scrollTop = 0;
}

function renderCards() {
  const c = document.getElementById('scrollArea');
  if (currentTab === 'nearby') {
    let items = POI_DATA.located.map(p => ({...p, distance: userLat ? haversine(userLat,userLon,p.lat,p.lon) : null}));
    if (userLat) items.sort((a,b) => a.distance - b.distance);
    c.innerHTML = items.map(p => `
      <div class="card ${p.distance && p.distance < NEARBY_HIGHLIGHT ? 'nearby' : ''}" onclick="openDetailById('located','${p.id}')">
        <div class="card-top">
          <div class="card-title">${p.name}</div>
          ${p.distance !== null
            ? `<span class="card-badge badge-distance">${formatDist(p.distance)}</span>`
            : `<span class="card-badge badge-category">${p.category}</span>`}
        </div>
        <div class="card-oneliner">${p.one_liner}</div>
      </div>`).join('');
  } else {
    c.innerHTML = POI_DATA.general.map(p => `
      <div class="card" onclick="openDetailById('general','${p.id}')">
        <div class="card-top">
          <div class="card-title">${p.name}</div>
          <span class="card-badge badge-category">${p.category}</span>
        </div>
        <div class="card-oneliner">${p.one_liner}</div>
      </div>`).join('');
  }
}


// ── Detail ──
function openDetailById(group, id) {
  const poi = POI_DATA[group].find(p => p.id === id);
  if (poi) openDetail(poi);
}

function openDetail(poi) {
  currentDetailPOI = poi;
  document.getElementById('detailTitle').textContent = poi.name;
  document.getElementById('detailBody').innerHTML = poi.summary.split('\n\n').map(p => '<p>'+p+'</p>').join('');
  document.getElementById('navBtn').style.display = (poi.lat && poi.lon) ? 'flex' : 'none';
  stopSpeak();
  document.getElementById('audioProgress').classList.remove('visible');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('copyLabel').textContent = 'Copy for Voice';
  document.getElementById('copyVoiceBtn').classList.remove('copied');
  document.getElementById('detailView').classList.add('open');
  document.querySelector('.detail-scroll').scrollTop = 0;
}

function closeDetail() {
  stopSpeak();
  document.getElementById('detailView').classList.remove('open');
  currentDetailPOI = null;
}

function navigateTo() {
  if (!currentDetailPOI?.lat) return;
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${currentDetailPOI.lat},${currentDetailPOI.lon}&travelmode=walking`, '_blank');
}


// ── Copy for Voice App ──
function copyForVoice() {
  if (!currentDetailPOI) return;
  const text = VOICE_PROMPT + currentDetailPOI.summary;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copyLabel').textContent = 'Copied!';
    document.getElementById('copyVoiceBtn').classList.add('copied');
    setTimeout(() => {
      document.getElementById('copyLabel').textContent = 'Copy for Voice';
      document.getElementById('copyVoiceBtn').classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    document.getElementById('copyLabel').textContent = 'Copied!';
    document.getElementById('copyVoiceBtn').classList.add('copied');
    setTimeout(() => {
      document.getElementById('copyLabel').textContent = 'Copy for Voice';
      document.getElementById('copyVoiceBtn').classList.remove('copied');
    }, 2000);
  });
}


// ── Audio / TTS ──
function toggleSpeak() { isSpeaking ? stopSpeak() : startSpeak(); }

function startSpeak() {
  if (!currentDetailPOI) return;
  stopSpeak();

  // Try pre-generated audio file first
  if (AUDIO_BASE_PATH) {
    const url = AUDIO_BASE_PATH + currentDetailPOI.id + '.mp3';
    currentAudio = new Audio(url);

    currentAudio.addEventListener('canplaythrough', () => {
      currentAudio.play();
      isSpeaking = true;
      updateSpeakUI();
      document.getElementById('audioProgress').classList.add('visible');
    }, { once: true });

    currentAudio.addEventListener('timeupdate', () => {
      if (currentAudio && currentAudio.duration) {
        document.getElementById('progressFill').style.width =
          (currentAudio.currentTime / currentAudio.duration * 100) + '%';
      }
    });

    currentAudio.addEventListener('ended', () => {
      isSpeaking = false;
      updateSpeakUI();
    });

    currentAudio.addEventListener('error', () => {
      currentAudio = null;
      useBrowserTTS(); // fallback
    });
    return;
  }

  useBrowserTTS();
}

function useBrowserTTS() {
  if (!currentDetailPOI || !window.speechSynthesis) return;
  const text = currentDetailPOI.summary.replace(/\n/g, ' ');
  speechUtterance = new SpeechSynthesisUtterance(text);
  speechUtterance.rate = 0.95;

  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.name.includes('Samantha')) ||
            voices.find(v => v.lang.startsWith('en') && v.localService) ||
            voices.find(v => v.lang.startsWith('en'));
  if (v) speechUtterance.voice = v;

  speechUtterance.onend = () => { isSpeaking = false; updateSpeakUI(); };
  speechSynthesis.speak(speechUtterance);
  isSpeaking = true;
  updateSpeakUI();
}

function stopSpeak() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
    document.getElementById('audioProgress').classList.remove('visible');
  }
  if (window.speechSynthesis && (speechSynthesis.speaking || speechSynthesis.pending)) {
    speechSynthesis.cancel();
  }
  isSpeaking = false;
  speechUtterance = null;
  updateSpeakUI();
}

function updateSpeakUI() {
  const btn = document.getElementById('speakBtn');
  const icon = document.getElementById('speakIcon');
  const label = document.getElementById('speakLabel');
  document.getElementById('gpsDot').classList.toggle('speaking', isSpeaking);
  if (isSpeaking) {
    btn.classList.add('speaking-btn');
    btn.classList.remove('primary');
    icon.textContent = '⏸'; label.textContent = 'Stop';
  } else {
    btn.classList.remove('speaking-btn');
    btn.classList.add('primary');
    icon.textContent = '🔊'; label.textContent = 'Listen';
  }
}

if (window.speechSynthesis && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => {};
}


// ── Init ──
initMap();
renderCards();
startTracking();
</script>
</body>
